substitutions:
  name: xvf3800-voice
  friendly_name: "XVF3800 Voice"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.5.0

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_MHZ: "240"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  power_save_mode: none
  manual_ip:
    static_ip: 192.168.1.200
    gateway: 192.168.1.1
    subnet: 255.255.255.0

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="

ota:
  - platform: esphome

logger:
  level: INFO

# ── I2C bus (to XVF3800 @ 0x2C + AIC3104) ──
i2c:
  - id: internal_i2c
    sda: GPIO5
    scl: GPIO6
    scan: true
    frequency: 100kHz

# ── Time ──
time:
  - platform: homeassistant
    id: esptime

# ── I2S Audio buses (XVF3800 is master, ESP32 is secondary) ──
i2s_audio:
  # Output bus (speaker) — shares LRCLK/BCLK with input
  - id: i2s_output
    i2s_lrclk_pin:
      number: GPIO7
      allow_other_uses: true
    i2s_bclk_pin:
      number: GPIO8
      allow_other_uses: true
    # i2s_mclk NOT used — XVF3800 generates its own MCLK

  # Input bus (microphone) — same pins as output
  - id: i2s_input
    i2s_lrclk_pin:
      number: GPIO7
      allow_other_uses: true
    i2s_bclk_pin:
      number: GPIO8
      allow_other_uses: true

# ── Microphone (from XVF3800 via I2S) ──
microphone:
  - platform: i2s_audio
    id: i2s_mics
    i2s_din_pin: GPIO43
    adc_type: external
    pdm: false
    sample_rate: 48000
    bits_per_sample: 32bit
    i2s_mode: secondary
    i2s_audio_id: i2s_input
    channel: stereo

# ── Speaker (to XVF3800 → AIC3104 DAC) ──
speaker:
  # Hardware speaker output via I2S → XVF3800 → AIC3104
  - platform: i2s_audio
    id: i2s_audio_speaker
    sample_rate: 48000
    i2s_mode: secondary
    i2s_dout_pin: GPIO44
    bits_per_sample: 32bit
    i2s_audio_id: i2s_output
    dac_type: external
    channel: stereo
    timeout: never
    buffer_duration: 100ms
    audio_dac: aic3104_dac

  # Mixer: combine announcement + media streams
  - platform: mixer
    id: mixing_speaker
    output_speaker: i2s_audio_speaker
    num_channels: 2
    source_speakers:
      - id: announcement_mixing_input
        timeout: never
      - id: media_mixing_input
        timeout: never

  # Resamplers: ensure 48kHz for both pipelines
  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: 48000
    bits_per_sample: 16
  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

# ── Audio DAC (AIC3104 on I2C) ──
audio_dac:
  - platform: aic3104
    id: aic3104_dac
    i2c_id: internal_i2c

# ── Media sources & player ──
audio_file:
  - id: mute_switch_on_sound
    file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/mute_switch_on.flac
  - id: mute_switch_off_sound
    file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/mute_switch_off.flac
  - id: timer_finished_sound
    file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
  - id: wake_word_triggered_sound
    file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac

media_source:
  - platform: audio_file
    id: audio_file_announcement_source
  - platform: audio_http
    id: http_announcement_source
    buffer_size: 250000
  - platform: audio_http
    id: http_media_source
    buffer_size: 500000

media_player:
  - platform: speaker_source
    id: external_media_player
    name: "XVF3800 Speaker"
    announcement_pipeline:
      format: FLAC
      num_channels: 1
      sample_rate: 48000
      speaker: announcement_resampling_speaker
      sources:
        - audio_file_announcement_source
        - http_announcement_source
    media_pipeline:
      format: FLAC
      num_channels: 1
      sample_rate: 48000
      speaker: media_resampling_speaker
      sources:
        - http_media_source
    volume_increment: 0.05
    volume_min: 0.0
    volume_max: 1.0
    on_announcement:
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s

# ── External components (formatBCE) ──
external_components:
  - source:
      type: git
      url: https://github.com/formatBCE/esphome
      ref: respeaker_microphone
    components:
      - i2s_audio
    refresh: 0s
  - source:
      type: git
      url: https://github.com/formatBCE/Respeaker-XVF3800-ESPHome-integration
      ref: main
    components:
      - respeaker_xvf3800
      - aic3104
    refresh: 0s

# ── XVF3800 Voice Processor ──
respeaker_xvf3800:
  id: respeaker
  address: 0x2C
  mute_switch:
    id: mic_mute_switch
    name: "Microphone Mute"
    update_interval: 1s
  dfu_version:
    name: "Firmware Version"
    update_interval: 120s
  led_beam_sensor:
    name: "Voice Beam Direction"
    id: beam_direction
    internal: true
  firmware:
    url: https://github.com/formatBCE/Respeaker-XVF3800-ESPHome-integration/raw/refs/heads/main/application_xvf3800_inthost-lr48-sqr-i2c-v1.0.7-release.bin
    version: "1.0.7"
    md5: 043a848f544ff2c7265ac19685daf5de

# ── Wake Word ──
micro_wake_word:
  id: mww
  microphone:
    microphone: i2s_mics
    channels: 1
  models:
    - model: hey_jarvis
      id: hey_jarvis
    - model: https://github.com/kahrendt/microWakeWord/releases/download/okay_nabu_20241226.3/okay_nabu.json
      id: okay_nabu
  on_wake_word_detected:
    - if:
        condition:
          switch.is_off: mic_mute_switch
        then:
          - voice_assistant.start:
              wake_word: !lambda return wake_word;

# ── Voice Assistant ──
voice_assistant:
  id: va
  microphone: i2s_mics
  speaker: i2s_audio_speaker
  noise_suppression_level: 2
  volume_multiplier: 2.0
  use_wake_word: true
  on_start:
    - logger.log: "Voice started"
  on_end:
    - logger.log: "Voice ended"
  on_error:
    - logger.log: "Voice error"
  on_listening:
    - logger.log: "Listening..."

# ── Binary sensors ──
# Mute button is connected directly to XVF3800 (handled by respeaker_xvf3800 component)
# No GPIO buttons on ESP32 side for this board

# ── Simple LED control ──
number:
  - platform: template
    id: led_brightness
    name: "LED Brightness"
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 0.0
    max_value: 1.0
    step: 0.1
    initial_value: 0.8
    mode: slider
