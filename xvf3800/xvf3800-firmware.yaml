substitutions:
  name: xvf3800-voice
  friendly_name: "XVF3800 Voice"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_FREQ_80M: "y"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  power_save_mode: none
  manual_ip:
    static_ip: 192.168.1.223
    gateway: 192.168.1.1
    subnet: 255.255.255.0

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="
  on_client_connected:
    - micro_wake_word.start:

ota:
  - platform: esphome

http_request:
  id: http_client

logger:
  level: DEBUG

i2c:
  - id: internal_i2c
    sda: GPIO5
    scl: GPIO6
    scan: true
    frequency: 100kHz
    sda_pullup_enabled: true
    scl_pullup_enabled: true

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.5.0
  on_boot:
    priority: 800
    then:
      - delay: 3s

time:
  - platform: homeassistant
    id: esptime

# ── I2S Audio ──
i2s_audio:
  - id: i2s_output
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO8

# ── Microphone ──
microphone:
  - platform: i2s_audio
    id: i2s_mics
    i2s_din_pin: GPIO43
    adc_type: external
    pdm: false
    sample_rate: 48000
    bits_per_sample: 32bit
    i2s_mode: secondary
    i2s_audio_id: i2s_output
    channel: stereo

# ── External components ──
external_components:
  - source:
      type: git
      url: https://github.com/formatBCE/esphome
      ref: respeaker_microphone
    components:
      - i2s_audio
      - micro_wake_word
      - voice_assistant
    refresh: 0s
  - source:
      type: local
      path: /home/radxa/stackchan-esphome/xvf3800-integration/esphome/components
    components:
      - respeaker_xvf3800
    refresh: 0s

# ── XVF3800 (I2C control only, no polling entities) ──
respeaker_xvf3800:
  id: respeaker
  address: 0x2C
  i2c_id: internal_i2c
  firmware:
    url: https://github.com/formatBCE/Respeaker-XVF3800-ESPHome-integration/raw/refs/heads/main/application_xvf3800_inthost-lr48-sqr-i2c-v1.0.7-release.bin
    version: "1.0.7"
    md5: 043a848f544ff2c7265ac19685daf5de

# ── Wake Word ──
micro_wake_word:
  id: mww
  microphone:
    microphone: i2s_mics
    channels: 1
  stop_after_detection: false
  vad:
    probability_cutoff: 0.05
  models:
    - model: https://github.com/OHF-Voice/micro-wake-word/releases/download/okay_nabu_20241226.3/okay_nabu.json
      id: okay_nabu
      probability_cutoff: 0.05
    - model: hey_jarvis
      id: hey_jarvis
      probability_cutoff: 0.97
    - model: hey_mycroft
      id: hey_mycroft
      probability_cutoff: 0.95
  on_wake_word_detected:
    - logger.log: "Wake word detected!"
    - http_request.post:
        url: http://192.168.1.145:5050/wake-word
        json:
          wake_word: "{{this.name}}"
          device: xvf3800-voice
    - delay: 200ms
    - voice_assistant.start:
    - logger.log: "Event: VA start OK"

# ── Voice Assistant ──
voice_assistant:
  id: va
  microphone: i2s_mics
  micro_wake_word: mww
  use_wake_word: false
  noise_suppression_level: 0
  volume_multiplier: 1.0
  on_listening:
    - logger.log: "VA: Listening"
  on_stt_end:
    - logger.log: "VA: STT end"
    - delay: 300ms
  on_tts_start:
    - logger.log: "VA: TTS start"
  on_end:
    - logger.log: "VA: End"
    - delay: 2s
    - micro_wake_word.start:
    - logger.log: "WW restarted after VA end"
  on_client_connected:
    - micro_wake_word.start:
    - logger.log: "WW started (HA connected)"
  on_error:
    - logger.log: "VA: Error - restarting WW"
    - delay: 2s
    - micro_wake_word.start:
