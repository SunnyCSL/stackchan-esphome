substitutions:
  name: xvf3800-voice
  friendly_name: "XVF3800 Voice"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.5.0
  on_boot:
    then:
      - lambda: |
          // Set VNR to Low (1) for wall-echo compensation
          uint8_t buf[] = {241, 0x00, 2, 1};
          id(respeaker)->write(buf, sizeof(buf));
      - voice_assistant.start_continuous:

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  power_save_mode: none
  manual_ip:
    static_ip: 192.168.1.200
    gateway: 192.168.1.1
    subnet: 255.255.255.0

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="

ota:
  - platform: esphome

logger:
  level: INFO

# ── I2C bus (to XVF3800 @ 0x2C) ──
i2c:
  - id: internal_i2c
    sda: GPIO5
    scl: GPIO6
    scan: true
    frequency: 100kHz

# ── Time ──
time:
  - platform: homeassistant
    id: esptime

# ── I2S mic bus (XVF3800 is master at 48kHz) ──
i2s_audio:
  - id: i2s_input
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO8

# ── Microphone (from XVF3800 via I2S) ──
microphone:
  - platform: i2s_audio
    id: i2s_mics
    i2s_din_pin: GPIO43
    adc_type: external
    pdm: false
    sample_rate: 16000
    bits_per_sample: 32bit
    i2s_mode: secondary         # XMOS is master
    i2s_audio_id: i2s_input
    channel: left               # Left channel only (mono)

# ── External components ──
external_components:
  - source:
      type: git
      url: https://github.com/formatBCE/Respeaker-XVF3800-ESPHome-integration
      ref: main
    components:
      - respeaker_xvf3800
    refresh: 0s

# ── XVF3800 Voice Processor ──
respeaker_xvf3800:
  id: respeaker
  address: 0x2C
  mute_switch:
    id: mic_mute_switch
    name: "Microphone Mute"
    update_interval: 1s
  dfu_version:
    name: "Firmware Version"
    update_interval: 120s
  led_beam_sensor:
    name: "Voice Beam Direction"
    id: beam_direction
    update_interval: 200ms
    internal: true
  firmware:
    url: https://github.com/formatBCE/Respeaker-XVF3800-ESPHome-integration/raw/refs/heads/main/application_xvf3800_inthost-lr48-sqr-i2c-v1.0.7-release.bin
    version: "1.0.7"
    md5: 043a848f544ff2c7265ac19685daf5de

# ── Voice Assistant (always-on, VAD-gated) ──
voice_assistant:
  id: va
  microphone:
    microphone: i2s_mics
    channels: 0
  use_wake_word: false
  noise_suppression_level: 2
  on_listening:
    - lambda: |-
        // Voice detected — light up center LED blue
        uint32_t colors[12];
        for (int i = 0; i < 12; i++) colors[i] = 0x00AA00FF;
        id(respeaker).set_led_ring(colors);
    - logger.log: "Voice detected (VAD)"
  on_stt_end:
    - logger.log: "STT complete"
  on_end:
    - logger.log: "Voice ended"
  on_error:
    - logger.log: "Voice error"
interval:
  - interval: 200ms
    then:
      lambda: |
        static uint32_t colors[12];
        static int last_direction = -2;
        static uint32_t last_update = 0;
        static int smoothed = -2;
        static int count = 0;

        int direction = (int)id(beam_direction).get_state();
        uint32_t now = millis();

        // Smooth DOA: require 3 consecutive same direction
        if (direction >= 0 && direction <= 11) {
          if (direction == smoothed) { count++; }
          else { count = 1; smoothed = direction; }
        }
        if (count < 3) direction = last_direction;

        if (direction >= 0 && direction <= 11 && direction != last_direction) {
          last_direction = direction;
          last_update = now;

          float bri = id(led_brightness).state;
          uint8_t b = (uint8_t)(255.0f * bri);

          for (int i = 0; i < 12; i++) {
            int dist = abs(i - direction);
            if (dist > 6) dist = 12 - dist;
            uint8_t level = 0;
            switch (dist) {
              case 0: level = b; break;
              case 1: level = b * 0.30f; break;
              case 2: level = b * 0.10f; break;
              default: level = 0; break;
            }
            // Cool white: Blue+Green, zero Red
            colors[i] = ((uint32_t)level) | ((uint32_t)(level * 0.5f) << 8);
          }
          id(respeaker).set_led_ring(colors);
        }

        // Fade out after 3s silence
        if (last_direction >= 0 && now - last_update > 3000) {
          float fade = 1.0f - (now - last_update - 3000) / 2000.0f;
          if (fade < 0) fade = 0;
          float bri = id(led_brightness).state;
          uint8_t b = (uint8_t)(255.0f * bri * fade);
          for (int i = 0; i < 12; i++) {
            int dist = abs(i - last_direction);
            if (dist > 6) dist = 12 - dist;
            uint8_t level = 0;
            switch (dist) {
              case 0: level = b * 0.4f; break;
              case 1: level = b * 0.10f; break;
              default: level = 0; break;
            }
            colors[i] = ((uint32_t)level) | ((uint32_t)(level * 0.4f) << 8);
          }
          id(respeaker).set_led_ring(colors);
          if (fade == 0) last_direction = -2;
        }

# ── LED Brightness ──
number:
  - platform: template
    id: led_brightness
    name: "LED Brightness"
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 0.0
    max_value: 1.0
    step: 0.1
    initial_value: 0.8
    mode: slider
