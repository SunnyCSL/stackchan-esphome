# ============================================================
# XVF3800 - ESP32-S3 Firmware
# Role: Minimal HA-connected node (pure infrastructure)
# ============================================================
# Architecture:
#   XMOS XU316 → USB Audio → Radxa (wake word via openWakeWord)
#   ESP32-S3  → Wi-Fi/API → Home Assistant (status + control)
# -----------------------------------------------------------
# XMOS-to-ESP32 I2C/I2S path: BROKEN (closed case)
# ESP32 does NOT process audio - XMOS handles it all via USB
# ============================================================

substitutions:
  name: xvf3800-voice
  friendly_name: "XVF3800 Voice"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.5.0

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_FREQ_80M: "y"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY: "y"

psram:
  mode: octal
  speed: 80MHz

# ── Connectivity ──────────────────────────────────────────────

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  power_save_mode: none
  manual_ip:
    static_ip: 192.168.1.223
    gateway: 192.168.1.1
    subnet: 255.255.255.0

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="

ota:
  - platform: esphome

# ── System ────────────────────────────────────────────────────

logger:
  level: ERROR

time:
  - platform: homeassistant
