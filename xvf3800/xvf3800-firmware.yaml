# ============================================================
# XVF3800 - ESP32-S3 Firmware
# Role: HA-connected node + USB audio bridge infrastructure
# ============================================================
# Architecture:
#   XMOS XU316 → USB Audio → Radxa (wake word via openWakeWord)
#   ESP32-S3  → Wi-Fi/API → Home Assistant (assist satellite)
# -----------------------------------------------------------
# XMOS-to-ESP32 I2C/I2S path: BROKEN (closed case)
# ESP32 voice_assistant included for HA entity availability
# ============================================================

substitutions:
  name: xvf3800-voice
  friendly_name: "XVF3800 Voice"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.5.0

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_FREQ_80M: "y"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY: "y"

psram:
  mode: octal
  speed: 80MHz

# ── Connectivity ──────────────────────────────────────────────

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  power_save_mode: none
  manual_ip:
    static_ip: 192.168.1.223
    gateway: 192.168.1.1
    subnet: 255.255.255.0

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="

ota:
  - platform: esphome

# ── System ────────────────────────────────────────────────────

logger:
  level: ERROR

time:
  - platform: homeassistant

# ── I2S Audio (XMOS bridge - may not have signal) ─────────────
# GPIO43 = I2S data from XMOS (I2C/I2S path reliability unknown)

i2s_audio:
  i2s_lrclk_pin: GPIO10
  i2s_bclk_pin: GPIO11
  i2s_mclk_pin: GPIO12

microphone:
  - platform: i2s_audio
    id: xvf3800_mic
    adc_type: external
    i2s_din_pin: GPIO13
    pdm: false
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: stereo
    use_apll: false

# ── Wake Word — "Robi" (fixed position, high sensitivity) ────

micro_wake_word:
  models:
    - model: "github://esphome/micro-wake-word-models/models/v2/okay_nabu.json"
      probability_cutoff: 0.93
      sliding_window_size: 7
  microphone:
    microphone: xvf3800_mic
    channels: 0
    gain_factor: 6
  on_wake_word_detected:
    - lambda: |-
        ESP_LOGI("ww", "XVF3800 Robi detected");
    - homeassistant.event:
        event: esphome.xvf3800_wake_word
        data:
          wake_word: !lambda return wake_word;

# ── Voice Assistant (stub - keeps assist_satellite available) ──

voice_assistant:
  microphone: xvf3800_mic
  use_wake_word: false
  on_client_connected:
    then:
      - lambda: ESP_LOGI("va", "XVF3800 voice client connected");
