substitutions:
  name: xvf3800-voice
  friendly_name: "XVF3800 Voice"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.5.0
  on_boot:
    then:
      - lambda: |
          // Set VNR to Low (1) for wall-echo compensation
          uint8_t buf[] = {241, 0x00, 2, 1};
          id(respeaker)->write(buf, sizeof(buf));
          ESP_LOGI("xvf3800", "VNR set to Low (1)");

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_MHZ: "240"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  power_save_mode: none
  manual_ip:
    static_ip: 192.168.1.200
    gateway: 192.168.1.1
    subnet: 255.255.255.0

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="

ota:
  - platform: esphome

logger:
  level: INFO

# ── I2C bus (to XVF3800 @ 0x2C + AIC3104) ──
i2c:
  - id: internal_i2c
    sda: GPIO5
    scl: GPIO6
    scan: true
    frequency: 100kHz

# ── Time ──
time:
  - platform: homeassistant
    id: esptime

# ── I2S Audio buses (XVF3800 is master, ESP32 secondary) ──
# Single bus: XVF3800 shares LRCLK/BCLK for both mic & speaker
i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO8

# ── Microphone (from XVF3800 via I2S) ──
microphone:
  - platform: i2s_audio
    id: i2s_mics
    i2s_din_pin: GPIO43
    adc_type: external
    pdm: false
    sample_rate: 48000          # XMOS outputs 48kHz; formatBCE reports 16kHz for validation
    bits_per_sample: 32bit
    i2s_mode: secondary
    i2s_audio_id: i2s_bus
    channel: left

# ── External components ──
external_components:
  - source:
      type: git
      url: https://github.com/formatBCE/esphome
      ref: respeaker_microphone
    components:
      - i2s_audio
      - voice_assistant
      - micro_wake_word
    refresh: 0s
  - source:
      type: git
      url: https://github.com/formatBCE/Respeaker-XVF3800-ESPHome-integration
      ref: main
    components:
      - respeaker_xvf3800
      - aic3104
    refresh: 0s

# ── XVF3800 Voice Processor ──
respeaker_xvf3800:
  id: respeaker
  address: 0x2C
  mute_switch:
    id: mic_mute_switch
    name: "Microphone Mute"
    update_interval: 1s
  dfu_version:
    name: "Firmware Version"
    update_interval: 120s
  led_beam_sensor:
    name: "Voice Beam Direction"
    id: beam_direction
    update_interval: 100ms
    internal: false
  firmware:
    url: https://github.com/formatBCE/Respeaker-XVF3800-ESPHome-integration/raw/refs/heads/main/application_xvf3800_inthost-lr48-sqr-i2c-v1.0.7-release.bin
    version: "1.0.7"
    md5: 043a848f544ff2c7265ac19685daf5de

# ── Wake Word Detection ──
micro_wake_word:
  id: mww
  microphone:
    microphone: i2s_mics
    channels: 0
  models:
    - model: hey_jarvis
      id: hey_jarvis
  on_wake_word_detected:
    - logger.log: "Wake word detected! Starting voice..."
    - voice_assistant.start:
        wake_word: !lambda return wake_word;
# ── Voice Assistant ──
voice_assistant:
  id: va
  micro_wake_word: mww
  microphone:
    microphone: i2s_mics
    channels: 0
  use_wake_word: false
  noise_suppression_level: 2

# ── LED Ring DOA Visualization ──
interval:
  - interval: 100ms
    then:
      lambda: |
        static uint32_t colors[12];
        static int last_direction = -2;
        static uint32_t last_update = 0;
        
        int direction = (int)id(beam_direction).get_state();
        uint32_t now = millis();
        
        static int smoothed_direction = -2;
        static int direction_count = 0;
        if (direction >= 0 && direction <= 11) {
          if (direction == smoothed_direction) {
            direction_count++;
          } else {
            direction_count = 1;
            smoothed_direction = direction;
          }
        }
        if (direction_count < 3) direction = last_direction;
        
        if (direction >= 0 && direction <= 11 && direction != last_direction) {
          last_direction = direction;
          last_update = now;
          
          float brightness = id(led_brightness).state;
          uint8_t b = (uint8_t)(255.0f * brightness);
          
          for (int i = 0; i < 12; i++) {
            int dist = abs(i - direction);
            if (dist > 6) dist = 12 - dist;
            
            uint8_t level = 0;
            switch (dist) {
              case 0: level = b; break;
              case 1: level = b * 0.30f; break;
              case 2: level = b * 0.10f; break;
              default: level = 0; break;
            }
            colors[i] = ((uint32_t)level) | ((uint32_t)(level * 0.5f) << 8);
          }
          id(respeaker).set_led_ring(colors);
        }
        
        if (last_direction >= 0 && now - last_update > 3000) {
          float fade = 1.0f - (now - last_update - 3000) / 2000.0f;
          if (fade < 0) fade = 0;
          
          float brightness = id(led_brightness).state;
          uint8_t b = (uint8_t)(255.0f * brightness * fade);
          
          for (int i = 0; i < 12; i++) {
            int dist = abs(i - last_direction);
            if (dist > 6) dist = 12 - dist;
            
            uint8_t level = 0;
            switch (dist) {
              case 0: level = b * 0.4f; break;
              case 1: level = b * 0.10f; break;
              default: level = 0; break;
            }
            colors[i] = ((uint32_t)level) | ((uint32_t)(level * 0.4f) << 8);
          }
          id(respeaker).set_led_ring(colors);
          if (fade == 0) last_direction = -2;
        }

# ── LED Brightness Control ──
number:
  - platform: template
    id: led_brightness
    name: "LED Brightness"
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 0.0
    max_value: 1.0
    step: 0.1
    initial_value: 0.8
    mode: slider
