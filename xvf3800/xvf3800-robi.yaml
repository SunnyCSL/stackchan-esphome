# ============================================================
# XVF3800 — ESP32-S3 Wake Word Detector (Fixed Position)
# Role: Sensitive "Robi" wake word → HTTP trigger Radxa
# ============================================================
# Detects "Robi" with higher sensitivity (fixed position)
# → HTTP POST to Radxa bridge → XVF3800 USB audio capture
# ============================================================

substitutions:
  name: xvf3800-ww
  friendly_name: "XVF3800 WakeWord"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.5.0

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

# ── Connectivity ──────────────────────────────────────────────

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  power_save_mode: none
  manual_ip:
    static_ip: 192.168.1.224  # Changed IP for new role
    gateway: 192.168.1.1
    subnet: 255.255.255.0

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="

ota:
  - platform: esphome

# ── System ────────────────────────────────────────────────────

logger:
  level: INFO

time:
  - platform: homeassistant

# ── I2S Audio (from XMOS, for wake word detection only) ──────

i2s_audio:
  i2s_lrclk_pin: GPIO10
  i2s_bclk_pin: GPIO11
  i2s_mclk_pin: GPIO12

microphone:
  - platform: i2s_audio
    id: xvf3800_mic
    adc_type: external
    i2s_din_pin: GPIO13
    pdm: false
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: stereo
    use_apll: false

# ── Wake Word — "Robi" (more sensitive, fixed position) ──────

micro_wake_word:
  models:
    - model: "github://esphome/micro-wake-word-models/models/v2/okay_nabu.json"
      probability_cutoff: 0.93
      sliding_window_size: 7
  microphone:
    microphone: xvf3800_mic
    channels: 0
    gain_factor: 6
  on_wake_word_detected:
    - lambda: |-
        ESP_LOGI("ww", "XVF3800 Robi detected");
    - homeassistant.event:
        event: esphome.xvf3800_wake_word
        data:
          wake_word: !lambda return wake_word;
    - micro_wake_word.start
