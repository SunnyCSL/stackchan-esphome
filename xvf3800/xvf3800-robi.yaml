# ============================================================
# XVF3800 — ESP32-S3 Fixed Voice Satellite
# Role: Fixed-position "Robi" wake word + voice pipeline
# ============================================================
# Architecture:
#   XVF3800 ESP32 detects "Robi" (micro_wake_word, sensitive)
#   → ESPHome voice_assistant → HA pipeline → Radxa processing
#   
#   XMOS XU316 → USB Audio → Radxa (for high-quality capture)
#   ESP32 I2S from XMOS: may work for wake word detection
# ============================================================

substitutions:
  name: xvf3800-voice
  friendly_name: "XVF3800 Voice"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.5.0

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_FREQ_80M: "y"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY: "y"

psram:
  mode: octal
  speed: 80MHz

# ── Connectivity ──────────────────────────────────────────────

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  power_save_mode: none
  manual_ip:
    static_ip: 192.168.1.223
    gateway: 192.168.1.1
    subnet: 255.255.255.0

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="

ota:
  - platform: esphome

# ── System ────────────────────────────────────────────────────

logger:
  level: INFO

time:
  - platform: homeassistant

# ── I2S Audio (from XMOS) ─────────────────────────────────────
# XMOS outputs beamformed audio via I2S to these pins

i2s_audio:
  i2s_lrclk_pin: GPIO10
  i2s_bclk_pin: GPIO11
  i2s_mclk_pin: GPIO12

microphone:
  - platform: i2s_audio
    id: xvf3800_mic
    adc_type: external
    i2s_din_pin: GPIO13
    pdm: false
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: stereo
    use_apll: false

# ── Wake Word — "Robi" (more sensitive, fixed position) ──────

micro_wake_word:
  models:
    - model: "github://esphome/micro-wake-word-models/models/v2/okay_nabu.json"
      # Will be replaced with custom Robi model once tested
      probability_cutoff: 0.93  # More sensitive than StickS3 (0.97)
      sliding_window_size: 7   # Larger window = more robust in fixed position
  microphone:
    microphone: xvf3800_mic
    channels: 0
    gain_factor: 6              # Higher gain for fixed far-field
  on_wake_word_detected:
    - lambda: |-
        ESP_LOGI("ww", "XVF3800 Robi detected");
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

speaker:
  - platform: i2s_audio
    id: xvf3800_spk
    dac_type: external
    i2s_dout_pin: GPIO14
    sample_rate: 16000
    bits_per_sample: 16bit
    use_apll: false

# ── Voice Assistant ───────────────────────────────────────────

voice_assistant:
  microphone: xvf3800_mic
  speaker: xvf3800_spk
  use_wake_word: true
  volume_multiplier: 2.0
  noise_suppression_level: 2
  auto_gain: 31dBFS
  on_client_connected:
    then:
      - lambda: |-
          ESP_LOGI("va", "XVF3800 HA voice client CONNECTED");
  on_listening:
    then:
      - lambda: |-
          ESP_LOGI("va", "XVF3800 === LISTENING ===");
  on_tts_start:
    then:
      - lambda: |-
          ESP_LOGI("va", "XVF3800 === SPEAKING ===");
  on_end:
    then:
      - lambda: |-
          ESP_LOGI("va", "XVF3800 === VA END ===");
      - delay: 300ms
      - micro_wake_word.start
