# StackChan Home Assistant Integration Example Configuration
# This configuration shows components available on StackChan
# Some components are still WIP
---
substitutions:
  name: stackchan
  friendly_name: M5Stack StackChan

  # Servo calibration — override in your local config if your StackChan's
  # mechanical assembly puts the head at a different zero than the defaults.
  # `*_angle_offset` is in degrees (mapped to steps via the servo's 0..360°
  # → 0..1024 step range). `*_position_to_angle` is the inverse formula used
  # to translate the servo's reported position back into degrees.
  # note, you can override the result with 'Servo Calibration' button
  servo_x_angle_offset: "164"
  servo_x_position_to_angle: "(x - 34.0f) * 0.3710f - 164.0f"
  servo_y_angle_offset: "50"
  servo_y_position_to_angle: "(x - 140.0f) * 90.0f / 260.0f;"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  project:
    name: m5stack.stackchan-bsp
    version: 2026.3.0
  on_boot: 
    - priority: 600
      then:
        - bm8563.read_time:
    - priority: -100
      then:
        - lambda: |-
            if (id(use_calib_value)) {
              ESP_LOGD("boot", "Restoring calibration: X=%d, Y=%d",
                      id(x_servo_zero_step),
                      id(y_servo_zero_step));
              float x_offset = id(x_servo_zero_step) / 2.844f;
              float y_offset = id(y_servo_zero_step) / 2.844f;
              // override default offset setting
              id(servo_x_angle)->set_angle_offset(static_cast<int>(x_offset));
              id(servo_y_angle)->set_angle_offset(static_cast<int>(y_offset));
            } else {
              ESP_LOGD("boot", "No calibration data, using defaults.");
            }
esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      # These SPIRAM configs are needed when using camera
      CONFIG_SPIRAM_SUPPORT: y
      CONFIG_SPIRAM_USE_CAPS_ALLOC: y
      CONFIG_SPIRAM_USE_MALLOC: y

psram:
  mode: quad
  speed: 80MHz

# Enable Home Assistant API
api:

ota:
  - platform: esphome
    id: ota_esphome

improv_serial:

esp32_improv:
  authorizer: none

wifi:
  on_connect:
    - delay: 5s  # Gives time for improv results to be transmitted
    - ble.disable:
  on_disconnect:
    - ble.enable:
  ap:

captive_portal:

# Enable logging
logger:
  level: VERBOSE

i2s_audio:
  id: i2s_audio_bus
  i2s_lrclk_pin: GPIO33
  i2s_bclk_pin: GPIO34
  i2s_mclk_pin:
    number: GPIO0
    ignore_strapping_warning: true

i2c:
  - id: bsp_bus
    sda: GPIO12
    scl: GPIO11
    frequency: 100kHz
    scan: true

spi:
  - id: spi_bus
    clk_pin: GPIO36
    mosi_pin: GPIO37

uart:
  tx_pin: GPIO6
  rx_pin: GPIO7
  baud_rate: 1000000

external_components:
  - source: github://m5stack/esphome-yaml/components
    components: [axp2101, aw88298, aw9523b, si12t, m5ioe1, ftservo, scs9009]
    refresh: 0s

axp2101:
  id: axp2101_pmu
  i2c_id: bsp_bus


aw9523b:
  id: aw9523b_hub
  i2c_id: bsp_bus
  p0_drive_mode: PUSH_PULL
  interrupt_pin: GPIO21  

output:
  - platform: axp2101
    type: range
    channel: DLDO1
    id: lcd_backlight_output
    min_voltage: 2600
    max_voltage: 3300

  - platform: axp2101
    channel: ALDO1
    voltage: 1800

  - platform: axp2101
    channel: ALDO2
    voltage: 3300
  
  - platform: axp2101
    channel: ALDO3
    voltage: 3300
  
  - platform: axp2101
    channel: ALDO4
    voltage: 3300

  - platform: axp2101
    channel: BLDO1
    voltage: 2800

  - platform: axp2101
    channel: BLDO2
    voltage: 1500

  - platform: axp2101
    channel: DCDC1
    voltage: 3300
  
  - platform: axp2101
    channel: DCDC4
    voltage: 1800

  - platform: axp2101
    channel: DCDC3
    voltage: 3300

  - platform: axp2101
    channel: DCDC5
    voltage: 3300

si12t:
  id: touch_hub
  i2c_id: bsp_bus

m5ioe1:
  id: m5ioe1_hub
  i2c_id: bsp_bus
  reset: true

switch:
  - platform: gpio
    name: "BUS_OUT_EN"
    pin:
      aw9523b_id: aw9523b_hub
      number: 1
    # BUS_OUT_EN = 1
    restore_mode: RESTORE_DEFAULT_ON

  - platform: gpio
    name: "USB_OTG_EN"
    pin:
      aw9523b_id: aw9523b_hub
      number: 5
    # USB_OTG_EN = 0
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    name: "BOOST_EN"
    pin:
      aw9523b_id: aw9523b_hub
      number: 15
    # BOOST_EN = 1
    restore_mode: RESTORE_DEFAULT_ON
  
  - platform: gpio
    id: aw_rst
    pin:
      aw9523b_id: aw9523b_hub
      number: 2
    internal: true
    restore_mode: RESTORE_DEFAULT_ON 

  - platform: gpio
    id: cam_rst
    pin:
      aw9523b_id: aw9523b_hub
      number: 8
    internal: true
    restore_mode: RESTORE_DEFAULT_ON 

  - platform: gpio
    name: "M5IOE1 Pin 1"
    pin:
      m5ioe1_id: m5ioe1_hub
      number: 0
      mode:
        output: true
        pullup: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: gpio
    name: "M5IOE1 Pin 14"
    pin:
      m5ioe1_id: m5ioe1_hub
      number: 13
      mode:
        output: true
        pullup: true
        open_drain: false
    restore_mode: RESTORE_DEFAULT_ON

scs9009:

remote_transmitter:
  id: ir_tx
  pin: GPIO5
  carrier_duty_percent: 50%
  non_blocking: true

remote_receiver:
  id: ir_rx
  pin: GPIO10

# IR Remote Climate example
climate:
  - platform: coolix
    name: "Default AC"
    visual:
      min_temperature: 18
      max_temperature: 30
      temperature_step: 1

# IR Proxy
infrared:
  # IR transmitter instance
  - platform: ir_rf_proxy
    name: IR Proxy Transmitter
    id: ir_proxy_tx
    remote_transmitter_id: ir_tx
  # IR receiver instance
  - platform: ir_rf_proxy
    name: IR Proxy Receiver
    id: ir_proxy_rx
    remote_receiver_id: ir_rx

# Time source
time:
  - platform: bm8563
    i2c_id: bsp_bus
    # repeated synchronization is not necessary unless the external RTC
    # is much more accurate than the internal clock
    update_interval: never
  - platform: homeassistant
    id: esptime
    # instead try to synchronize via network repeatedly ...
    on_time_sync:
      then:
        # ... and update the RTC when the synchronization was successful
        bm8563.write_time:

sensor:
  - platform: ftservo
    id: x_servo_sensor
    ftservo_id: x_servo
    position:
      id: servo_x_position
      name: "Servo X Position"
      filters:
        - delta: 3.0
      on_value:
        - lambda: |-
            if ( !id(use_calib_value) ) {
              float val = ${servo_x_position_to_angle};
              id(servo_x_angle).publish_state(roundf(val)); 
            } else {
              float x = id(servo_x_position).state;
              float zero = static_cast<float>(id(x_servo_zero_step));
              float val = (x - zero) * 0.3710f;
              id(servo_x_angle).publish_state(roundf(val));
            }

  - platform: ftservo
    id: y_servo_sensor
    ftservo_id: y_servo
    position:
      id: servo_y_position
      name: "Servo Y Position"
      filters:
        - delta: 3.0
      on_value:
        - lambda: |-
            if ( !id(use_calib_value) ) {
              float val = ${servo_y_position_to_angle};
              id(servo_y_angle).publish_state(roundf(val)); // using angle 
            } else {
              float x = id(servo_y_position).state;
              float zero = static_cast<float>(id(y_servo_zero_step));
              float val = (x - zero) * 90.0f / 260.0f;
              id(servo_y_angle).publish_state(roundf(val));
            }


  - platform: ltr_als_ps
    address: 0x23
    i2c_id: bsp_bus
    type: ALS_PS
    ambient_light:
      name: "Ambient light"
    glass_attenuation_factor: 2.5
    auto_mode: true
    ps_cooldown: 5 s
    ps_high_threshold: 500
    ps_counts: "Proximity counts"

  - platform: ina226
    i2c_id: bsp_bus
    address: 0x41
    shunt_resistance: 0.01 ohm
    max_current: 3.2A
    # adc time used for both, Bus Voltage and Shunt Voltage
    adc_time: 140us
    adc_averaging: 128
    update_interval: 60s
    current:
      name: "INA226 Current"
    power:
      name: "INA226 Power"
    bus_voltage:
      name: "INA226 Bus Voltage"
    shunt_voltage:
      name: "INA226 Shunt Voltage"

touchscreen:
  - platform: ft63x6
    id: touch
    i2c_id: bsp_bus
    reset_pin:
      aw9523b_id: aw9523b_hub
      number: 0
    calibration:
      x_min: 0
      x_max: 320
      y_min: 0
      y_max: 240
    on_touch:
      - lambda: |-
          ESP_LOGD("cal", "x=%d, y=%d, x_raw=%d, y_raw=%0d",
                          touch.x, touch.y, touch.x_raw,touch.y_raw);
          if (id(calibration_mode)) {
            // Tap to calibrate current servo position as zero
            float x_zero = id(servo_x_position).state;
            float y_zero = id(servo_y_position).state;
            float x_offset = x_zero / 2.844f;
            float y_offset = y_zero / 2.844f;
            id(servo_x_angle)->set_angle_offset(static_cast<int>(x_offset));
            id(servo_y_angle)->set_angle_offset(static_cast<int>(y_offset));
            id(use_calib_value) = true;
            id(x_servo_zero_step) = static_cast<int>(x_zero);
            id(y_servo_zero_step) = static_cast<int>(y_zero);
            id(calibration_mode) = false;
            ESP_LOGD("cal", "Calibration done: X=%d, Y=%d",
                     id(x_servo_zero_step), id(y_servo_zero_step));
          }

display:
  - platform: mipi_spi
    model: M5CORE
    dc_pin: GPIO35
    reset_pin:
      aw9523b_id: aw9523b_hub
      number: 9
    cs_pin:
      number: GPIO3
      ignore_strapping_warning: true
    data_rate: 40MHz
    invert_colors: true
    id: m5cores3_lcd
    show_test_card: false
    update_interval: 100ms
    lambda: |-
      // ── Face Drawing for M5Stack CoreS3 (320×240) ──
      auto w = it.get_width(), h = it.get_height();
      it.fill(Color::BLACK);

      bool blink = id(blink_closed);
      int expr = id(face_expression);
      bool cal_mode = id(calibration_mode);
      float sx = id(servo_x_angle).has_state() ? id(servo_x_angle).state : 0.0f;
      float sy = id(servo_y_angle).has_state() ? id(servo_y_angle).state : 0.0f;

      // Pupil offset follows servo angle (clamped)
      float px = fminf(fmaxf(sx / 164.0f * 8.0f, -8.0f), 8.0f);
      float py = fminf(fmaxf(sy / 90.0f * 6.0f - 2.0f, -6.0f), 6.0f);
      if (blink) { px = 0; py = 0; }

      // ── Eye positions ──
      int eye_lx = 120, eye_rx = 200, eye_y = 85;
      int eye_r = 18, iris_r = 8, pupil_r = 4;
      Color white = Color::WHITE;
      Color black = Color::BLACK;
      Color skin  = Color(255, 235, 200);

      // ── Skin (face oval approximated with circles) ──
      it.filled_circle(160, 110, 90, skin);
      it.filled_circle(125, 110, 75, skin);
      it.filled_circle(195, 110, 75, skin);

      // ── Left eye ──
      if (blink) {
        it.filled_rectangle(100, eye_y - 2, 40, 4, white);
      } else {
        it.filled_circle(eye_lx, eye_y, eye_r, white);
        it.filled_circle(eye_lx, eye_y, eye_r - 2, white);
        it.filled_circle(eye_lx + (int)px, eye_y + (int)py, iris_r, Color(60, 40, 20));
        it.filled_circle(eye_lx + (int)px, eye_y + (int)py, pupil_r, black);
        it.filled_circle(eye_lx + (int)(px * 0.4f), eye_y - 3 + (int)(py * 0.4f), 2, white);
      }

      // ── Right eye ──
      if (blink) {
        it.filled_rectangle(180, eye_y - 2, 40, 4, white);
      } else {
        it.filled_circle(eye_rx, eye_y, eye_r, white);
        it.filled_circle(eye_rx, eye_y, eye_r - 2, white);
        it.filled_circle(eye_rx + (int)px, eye_y + (int)py, iris_r, Color(60, 40, 20));
        it.filled_circle(eye_rx + (int)px, eye_y + (int)py, pupil_r, black);
        it.filled_circle(eye_rx + (int)(px * 0.4f), eye_y - 3 + (int)(py * 0.4f), 2, white);
      }

      // ── Mouth (using circles + lines — no arc() on mipi_spi) ──
      int mx = 160, my = 150;
      Color mouth_c = Color(200, 80, 60);
      if (expr == 0) { // neutral — two dots
        it.filled_circle(mx - 8, my + 2, 3, mouth_c);
        it.filled_circle(mx + 8, my + 2, 3, mouth_c);
      } else if (expr == 1) { // happy — wide smile
        it.filled_circle(mx - 8, my + 2, 4, mouth_c);
        it.filled_circle(mx + 8, my + 2, 4, mouth_c);
        it.line(mx - 14, my + 5, mx + 14, my + 5, mouth_c);
        it.line(mx - 14, my + 4, mx + 14, my + 4, mouth_c);
        it.line(mx - 14, my + 6, mx + 14, my + 6, mouth_c);
      } else if (expr == 2) { // sad — downturned
        it.filled_circle(mx - 6, my + 6, 4, mouth_c);
        it.filled_circle(mx + 6, my + 6, 4, mouth_c);
        it.line(mx - 12, my + 6, mx + 12, my + 6, mouth_c);
        it.line(mx - 12, my + 7, mx + 12, my + 7, mouth_c);
      } else if (expr == 3) { // angry — thick frown + brows
        it.line(mx - 12, my + 6, mx + 12, my + 6, mouth_c);
        it.line(mx - 12, my + 5, mx + 12, my + 5, mouth_c);
        it.line(mx - 12, my + 7, mx + 12, my + 7, mouth_c);
        it.line(mx - 12, my + 8, mx + 12, my + 8, mouth_c);
        it.line(mx - 12, my + 4, mx + 12, my + 4, mouth_c);
        it.line(95, 55, 120, 60, Color(60, 40, 20));
        it.line(200, 55, 175, 60, Color(60, 40, 20));
      } else if (expr == 4) { // surprised — open circle
        it.filled_circle(mx, my + 8, 10, Color(180, 60, 40));
        it.filled_circle(mx, my + 8, 6, Color(240, 100, 80));
      } else if (expr == 5) { // thinking — one dot + line
        it.filled_circle(mx - 4, my + 4, 3, mouth_c);
        it.line(mx + 2, my + 4, mx + 14, my + 2, mouth_c);
      } else if (expr == 6) { // sleeping
        it.filled_circle(mx - 4, my + 2, 3, mouth_c);
        it.filled_circle(mx + 4, my + 2, 3, mouth_c);
        it.printf(mx + 16, my - 10, id(font_sm), Color(150, 180, 255), TextAlign::TOP_LEFT, "zZ");
      } else if (expr == 7) { // speaking
        int mo = id(mouth_open);
        if (mo > 50) {
          it.filled_circle(mx, my + 6, 12, Color(240, 120, 100));
          it.filled_circle(mx, my + 6, 8, Color(200, 70, 50));
        } else if (mo > 20) {
          it.filled_circle(mx - 8, my + 4, 4, mouth_c);
          it.filled_circle(mx + 8, my + 4, 4, mouth_c);
          it.line(mx - 12, my + 4, mx + 12, my + 4, mouth_c);
        } else {
          it.filled_circle(mx - 6, my + 2, 3, mouth_c);
          it.filled_circle(mx + 6, my + 2, 3, mouth_c);
        }
      }

      // ── Calibration overlay ──
      if (cal_mode) {
        it.filled_rectangle(40, 90, 240, 50, Color::BLACK);
        it.printf(60, 100, id(font_sm), Color(255, 200, 0), TextAlign::TOP_LEFT, "Tap screen to calibrate");
        it.printf(60, 122, id(font_sm), Color(200, 200, 200), TextAlign::TOP_LEFT, "Hold head at neutral pos");
      }

      // ── Bottom info bar ──
      it.filled_rectangle(0, h - 30, w, 30, Color(10, 10, 30));
      if (cal_mode) {
        it.printf(0, h - 24, id(font_sm), Color(255, 200, 0), TextAlign::TOP_LEFT, "CALIBRATE %s%s",
          id(x_servo_zero_step) > 0 ? "O" : "X",
          id(y_servo_zero_step) > 0 ? "O" : "X");
      } else {
        auto time = id(esptime).now();
        if (time.is_valid()) {
          it.strftime(0, h - 24, id(font_sm), Color(100, 200, 255), TextAlign::TOP_LEFT, "%H:%M", time);
        }
        it.printf(w - 60, h - 24, id(font_sm), Color(100, 255, 100), TextAlign::TOP_LEFT, "X:%.0f Y:%.0f", sx, sy);
      }

font:
  - file: "gfonts://Roboto"
    id: font_md
    size: 24
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz 0123456789.:-"
  - file: "gfonts://Roboto"
    id: font_sm
    size: 16
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz 0123456789.:-!?"

light:
  - platform: monochromatic
    id: lcd_backlight
    name: "LCD Backlight"
    icon: "mdi:television"
    output: lcd_backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

  - platform: m5ioe1
    id: stackchan_light_bar
    name: "StackChan Light Bar"
    icon: mdi:led-strip
    num_led: 12
    effects:
      - random:
          name: "Random"
          transition_length: 1s
          update_interval: 1s
      - addressable_rainbow:
      - addressable_rainbow:
          name: Rainbow Effect With Custom Values
          speed: 10
          width: 50
      - addressable_twinkle:
      - addressable_twinkle:
          name: Twinkle Effect With Custom Values
          twinkle_probability: 5%
          progress_interval: 4ms

audio_adc:
  - platform: es7210
    id: es7210_adc
    i2c_id: bsp_bus
    bits_per_sample: 16bit
    sample_rate: 16000
    mic_gain: 36

audio_dac:
  - platform: aw88298
    id: aw88298_dac
    i2c_id: bsp_bus
    sample_rate: 48000

microphone:
  - platform: i2s_audio
    id: i2s_mic
    i2s_din_pin: GPIO14
    adc_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    i2s_audio_id: i2s_audio_bus

speaker:
  - platform: i2s_audio
    i2s_audio_id: i2s_audio_bus
    id: i2s_speaker
    dac_type: external
    i2s_dout_pin: GPIO13
    audio_dac: aw88298_dac

media_player:
  - platform: speaker
    name: None
    id: va_media_player
    volume_min: 0.5
    volume_max: 0.8
    announcement_pipeline:
      speaker: i2s_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1

ftservo:
  - platform: scs9009
    address: 1
    id: x_servo
  - platform: scs9009
    address: 2
    id: y_servo 

number:
  - platform: ftservo
    ftservo_id: x_servo
    angle:
      id: servo_x_angle
      name: "Servo X Angle"
      min_value: -164
      max_value: 164
      use_raw_angle: false
      angle_offset: ${servo_x_angle_offset}
      step: 5
    speed:
      id: servo_x_speed
      name: "Servo X Speed"
      min_value: 100
      max_value: 1500
      step: 100

  - platform: ftservo
    ftservo_id: y_servo
    angle:
      id: servo_y_angle
      name: "Servo Y Angle"
      min_value: 0
      max_value: 90
      use_raw_angle: false
      angle_offset: ${servo_y_angle_offset}
      step: 5
    speed:
      id: servo_y_speed
      name: "Servo Y Speed"
      min_value: 100
      max_value: 1500
      step: 100

button:
  - platform: template
    name: "Servo Calibration"
    on_press:
      - lambda: |-
          ESP_LOGD("ftservo", "Start calibration");
          float x_zero = id(servo_x_position).state;
          float y_zero = id(servo_y_position).state;
          // assign offset
          float x_offset = x_zero / 2.844f;
          float y_offset = y_zero / 2.844f;
          // override default offset setting
          id(servo_x_angle)->set_angle_offset(static_cast<int>(x_offset));
          id(servo_y_angle)->set_angle_offset(static_cast<int>(y_offset));
          // indicating we are using calibration value
          id(use_calib_value) = true;
          id(x_servo_zero_step) = static_cast<int>(x_zero);
          id(y_servo_zero_step) = static_cast<int>(y_zero);
      - delay: 100ms
      - lambda: |-
          ESP_LOGD("ftservo", "Preferences sync requested");          
          global_preferences->sync(); // sync at once
          ESP_LOGD("ftservo", "Done reading and saving zero position, X zero: %d, Y zero %d", 
                  id(x_servo_zero_step), id(y_servo_zero_step));

  - platform: template
    name: "Clear Calibration"
    on_press:
      - lambda: |-
          ESP_LOGD("ftservo", "Restore to default settings");
          id(use_calib_value)   = false;
          id(x_servo_zero_step) = ${servo_x_angle_offset};
          id(y_servo_zero_step) = ${servo_y_angle_offset};
      - delay: 1s
      - lambda: |-
          ESP_LOGD("ftservo", "Preferences sync requested");
          global_preferences->sync(); // sync at once
          ESP_LOGD("ftservo", "Done clear calibration");

  - platform: template
    name: "Face Calibration Mode"
    on_press:
      - lambda: |-
          id(calibration_mode) = true;
          id(m5cores3_lcd).update();
      - delay: 15s
      - lambda: |-
          id(calibration_mode) = false;
          id(m5cores3_lcd).update();

text_sensor:
  - platform: si12t
    name: "Touch Sensor 1"
    channel: CH_1
    update_interval: 1s
  - platform: si12t
    name: "Touch Sensor 2"
    channel: CH_2    
    update_interval: 1s
  - platform: si12t
    name: "Touch Sensor 3"
    channel: CH_3
    update_interval: 1s
   
esp32_camera:
  name: "Camera"
  i2c_id: bsp_bus
  setup_priority: -200  
  vsync_pin:
    number: GPIO46
    ignore_strapping_warning: true
  href_pin: GPIO38
  external_clock:
    pin: GPIO2
    frequency: 20MHz
  pixel_clock_pin:
    number: GPIO45
    ignore_strapping_warning: true
  data_pins: [GPIO39, GPIO40, GPIO41, GPIO42, GPIO15, GPIO16, GPIO48, GPIO47] # D0-D7
  max_framerate: 15.0 fps
  resolution: 320x240
  frame_buffer_count: 1
  frame_buffer_location: PSRAM
  pixel_format: RGB565
  jpeg_quality: 12
  brightness: 1
  contrast: 1
  saturation: 0
  aec_mode: manual
  aec_value: 800
  agc_mode: manual
  agc_value: 30

globals:
  - id: use_calib_value
    type: bool
    restore_value: yes
    initial_value: "false"
    update_interval: "100ms"
  - id: x_servo_zero_step
    type: int
    restore_value: yes
    initial_value: ${servo_x_angle_offset}
    update_interval: "100ms"
  - id: y_servo_zero_step
    type: int
    restore_value: yes
    initial_value: '${servo_y_angle_offset}'
    update_interval: "100ms"

  - id: blink_closed
    type: bool
    restore_value: no
    initial_value: "false"

  - id: face_expression
    type: int
    restore_value: no
    initial_value: "0"

  - id: calibration_mode
    type: bool
    restore_value: no
    initial_value: "false"

  - id: mouth_open
    type: int
    restore_value: no
    initial_value: "0"
select:
  - platform: template
    name: "Face Expression"
    id: face_expr_select
    icon: "mdi:emoticon-happy"
    optimistic: true
    options:
      - "Neutral"
      - "Happy"
      - "Sad"
      - "Angry"
      - "Surprised"
      - "Thinking"
      - "Sleeping"
      - "Speaking"
    initial_option: "Neutral"
    set_action:
      then:
        - lambda: |-
            if (x == "Neutral")    { id(face_expression) = 0; }
            else if (x == "Happy")  { id(face_expression) = 1; }
            else if (x == "Sad")    { id(face_expression) = 2; }
            else if (x == "Angry")  { id(face_expression) = 3; }
            else if (x == "Surprised") { id(face_expression) = 4; }
            else if (x == "Thinking") { id(face_expression) = 5; }
            else if (x == "Sleeping") { id(face_expression) = 6; }
            else if (x == "Speaking") { id(face_expression) = 7; }

interval:
  - id: blink_interval
    interval: 4s
    then:
      - lambda: |-
          if (id(face_expression) == 6) return;
          id(blink_closed) = true;
          id(m5cores3_lcd).update();
      - delay: 120ms
      - lambda: |-
          id(blink_closed) = false;
          id(m5cores3_lcd).update();

  - id: speaking_anim_interval
    interval: 120ms
    then:
      - lambda: |-
          if (id(face_expression) == 7) {
            static int frame = 0;
            frame = (frame + 1) % 100;
            id(mouth_open) = frame;
            id(m5cores3_lcd).update();
          }
