esphome:
  name: stackchan

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  ap:
    ssid: "StackChan Fallback"
    password: "stackchan123"

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="

ota:
  - platform: esphome

web_server:
  port: 80

logger:

i2c:
  sda: GPIO12
  scl: GPIO11
  frequency: 100kHz
  scan: true

spi:
  clk_pin: GPIO36
  mosi_pin: GPIO37

servo:
  - id: servo_x
    output: pwm_x
    min_level: 2.5%
    max_level: 12.5%
    restore: true
  - id: servo_y
    output: pwm_y
    min_level: 2.5%
    max_level: 12.5%
    restore: true

output:
  - platform: ledc
    pin: GPIO35
    id: pwm_x
    frequency: 50 Hz
  - platform: ledc
    pin: GPIO34
    id: pwm_y
    frequency: 50 Hz

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO38
    num_leds: 12
    chipset: SK6812
    name: "StackChan LEDs"
    id: stackchan_leds
    default_transition_length: 0.5s

display:
  - platform: ili9xxx
    model: ILI9342
    invert_colors: false
    dc_pin: GPIO4
    cs_pin: GPIO5
    reset_pin: GPIO15
    auto_clear_enabled: false
    lambda: |-
      it.fill(Color(0, 0, 0));
      it.print(10, 10, id(roboto_font), Color(255, 255, 255), "StackChan Ready");

font:
  - file: "gfonts://Roboto"
    id: roboto_font
    size: 16

remote_transmitter:
  - id: ir_tx
    pin: GPIO18
    carrier_duty_percent: 50%

remote_receiver:
  - id: ir_rx
    pin: GPIO19
