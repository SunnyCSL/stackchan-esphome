substitutions:
  name: stackchan
  friendly_name: StackChan
  # Servo calibration
  servo_x_angle_offset: "164"
  servo_x_position_to_angle: "(x - 34.0f) * 0.3710f - 164.0f"
  servo_y_angle_offset: "50"
  servo_y_position_to_angle: "(x - 140.0f) * 90.0f / 260.0f;"
  # TV IR codes
  tv_nec_power: "0x00FFE01F"
  tv_nec_hdmi1: "0x00FFA857"
  tv_nec_hdmi2: "0x00FF48B7"
  tv_nec_hdmi3: "0x00FFC837"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.3.0
  on_boot:
    - priority: 600
      then:
        - light.turn_on:
            id: lcd_backlight
            brightness: 80%
    - priority: 200
      then:
        - delay: 500ms
        - component.update: m5cores3_lcd

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"

psram:
  mode: quad
  speed: 80MHz

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  manual_ip:
    static_ip: 192.168.1.180
    gateway: 192.168.1.1
    subnet: 255.255.255.0
  ap:

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="
  services:
    - service: stackchan_servo
      variables:
        position_x: int
        position_y: int
      then:
        - number.set:
            id: servo_x_angle
            value: !lambda 'return position_x;'
        - number.set:
            id: servo_y_angle
            value: !lambda 'return position_y;'
    - service: stackchan_ir_send
      variables:
        nec_address: int
        nec_command: int
      then:
        - remote_transmitter.transmit_nec:
            address: !lambda 'return nec_address;'
            command: !lambda 'return nec_command;'
    - service: stackchan_expression
      variables:
        mode: string
      then:
        - lambda: |-
            if (mode == "idle") { id(set_idle).execute(); }
            else if (mode == "listening") { id(set_listening).execute(); }
            else if (mode == "speaking") { id(set_speaking).execute(); }
            else if (mode == "thinking") { id(set_thinking).execute(); }
            else if (mode == "processing") { id(set_processing).execute(); }
    - service: stackchan_nod
      then:
        - lambda: |-
            id(nod).execute();
    - service: stackchan_shake
      then:
        - lambda: |-
            id(shake).execute();
    - service: stackchan_point_tv
      then:
        - lambda: |-
            id(point_to_tv).execute();
    - service: stackchan_tv_power
      then:
        - lambda: |-
            id(tv_power_on).execute();
    - service: stackchan_tv_hdmi
      variables:
        input: int
      then:
        - lambda: |-
            id(tv_switch_hdmi).execute(input);
    - service: stackchan_media_mode
      variables:
        hdmi_input: int
      then:
        - lambda: |-
            id(media_mode).execute(hdmi_input);

ota:
  - platform: esphome

logger:
  level: INFO

time:
  - platform: homeassistant
    id: esptime

i2c:
  - id: bsp_bus
    sda: GPIO12
    scl: GPIO11

spi:
  - id: spi_bus
    clk_pin: GPIO36
    mosi_pin: GPIO37

uart:
  tx_pin: GPIO6
  rx_pin: GPIO7
  baud_rate: 1000000

external_components:
  - source: github://m5stack/esphome-yaml/components
    components: [axp2101, aw9523b, m5ioe1, ftservo, scs9009]
    refresh: 1h

# ── Audio (I2S) ──
i2s_audio:
  i2s_lrclk_pin: GPIO33
  i2s_bclk_pin: GPIO34
  i2s_mclk_pin: GPIO0

microphone:
  - platform: i2s_audio
    id: mic_a
    adc_type: external
    i2s_din_pin: GPIO14
    pdm: false
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: stereo

speaker:
  - platform: i2s_audio
    id: speaker_a
    dac_type: external
    i2s_dout_pin: GPIO13
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: stereo

# ── Media Player (HA TTS)
media_player:
  - platform: speaker
    name: None
    id: va_media_player
    volume_min: 0.5
    volume_max: 0.8
    announcement_pipeline:
      speaker: speaker_a
      format: FLAC
      sample_rate: 16000
      num_channels: 1

# ── Wake Word (local on ESP32-S3) ──
micro_wake_word:
  models:
    - hey_jarvis
  on_wake_word_detected:
    - then:
        - homeassistant.event:
            event: esphome.wake_word_detected
            data:
              device: stackchan
              confidence: "0.85"

# ── PMU ──
axp2101:
  id: axp2101_pmu
  i2c_id: bsp_bus

# ── IO Expander ──
aw9523b:
  id: aw9523b_hub
  i2c_id: bsp_bus
  p0_drive_mode: PUSH_PULL
  interrupt_pin: GPIO21

# ── RGB LED Bar ──
m5ioe1:
  id: m5ioe1_hub
  i2c_id: bsp_bus
  reset: true

# ── SCS9009 Servo Bus ──
scs9009:

# ── IR Transmitter (GPIO5, NEC) ──
remote_transmitter:
  id: ir_tx
  pin: GPIO5
  carrier_duty_percent: 50%

# ── Servos ──
ftservo:
  - platform: scs9009
    address: 1
    id: x_servo
  - platform: scs9009
    address: 2
    id: y_servo

number:
  - platform: ftservo
    ftservo_id: x_servo
    angle:
      id: servo_x_angle
      name: "Servo X Angle"
      min_value: -164
      max_value: 164
      step: 5
    speed:
      id: servo_x_speed
      name: "Servo X Speed"
      min_value: 100
      max_value: 1500
      step: 100
  - platform: ftservo
    ftservo_id: y_servo
    angle:
      id: servo_y_angle
      name: "Servo Y Angle"
      min_value: 0
      max_value: 90
      step: 5
    speed:
      id: servo_y_speed
      name: "Servo Y Speed"
      min_value: 100
      max_value: 1500
      step: 100

sensor:
  - platform: ftservo
    id: x_servo_sensor
    ftservo_id: x_servo
    position:
      id: servo_x_position
      name: "Servo X Position"
      filters:
        - delta: 3.0
  - platform: ftservo
    id: y_servo_sensor
    ftservo_id: y_servo
    position:
      id: servo_y_position
      name: "Servo Y Position"
      filters:
        - delta: 3.0

button:
  - platform: template
    name: "Servo Calibration"
    on_press:
      - lambda: |-
          float x_zero = id(servo_x_position).state;
          float y_zero = id(servo_y_position).state;
          id(servo_x_angle)->set_angle_offset(int(x_zero / 2.844f));
          id(servo_y_angle)->set_angle_offset(int(y_zero / 2.844f));
          id(use_calib_value) = true;
          id(x_servo_zero_step) = int(x_zero);
          id(y_servo_zero_step) = int(y_zero);
      - lambda: |-
          global_preferences->sync();

# ── Power Rails ──
output:
  - platform: axp2101
    type: range
    channel: DLDO1
    id: lcd_backlight_output
    min_voltage: 2600
    max_voltage: 3300
  - platform: axp2101
    channel: ALDO1
    voltage: 1800
  - platform: axp2101
    channel: ALDO2
    voltage: 3300
  - platform: axp2101
    channel: BLDO1
    voltage: 2800
  - platform: axp2101
    channel: BLDO2
    voltage: 1500
  - platform: axp2101
    channel: DCDC1
    voltage: 3300
  - platform: axp2101
    channel: DCDC3
    voltage: 3300

switch:
  - platform: gpio
    name: "BUS_OUT_EN"
    pin:
      aw9523b_id: aw9523b_hub
      number: 1
    restore_mode: ALWAYS_ON
  - platform: gpio
    name: "BOOST_EN"
    pin:
      aw9523b_id: aw9523b_hub
      number: 15
    restore_mode: RESTORE_DEFAULT_ON

light:
  - platform: monochromatic
    id: lcd_backlight
    name: "LCD Backlight"
    output: lcd_backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms
  - platform: m5ioe1
    id: stackchan_light_bar
    name: "StackChan Light Bar"
    num_led: 12
    effects:
      - random:
          name: Random
      - addressable_rainbow:
          name: Rainbow
    restore_mode: ALWAYS_OFF

globals:
  - id: use_calib_value
    type: bool
    restore_value: yes
    initial_value: "false"
  - id: x_servo_zero_step
    type: int
    restore_value: yes
    initial_value: '0'
  - id: y_servo_zero_step
    type: int
    restore_value: yes
    initial_value: '0'
  - id: is_thinking
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: is_processing
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: eye_phase
    type: int
    restore_value: false
    initial_value: '0'
  - id: is_listening
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: is_speaking
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: display_mode
    type: int
    restore_value: false
    initial_value: '0'
  - id: display_line1
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: display_line2
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: display_line3
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: pushed_text_timer
    type: int
    restore_value: false
    initial_value: '0'

interval:
  - interval: 700ms
    then:
      - lambda: |-
          id(eye_phase) = (id(eye_phase) + 1) % 16;
      - component.update: m5cores3_lcd
  - interval: 1s
    then:
      - lambda: |-
          if (id(pushed_text_timer) > 0) {
            id(pushed_text_timer)--;
            if (id(pushed_text_timer) == 0) {
              id(display_mode) = 0;
            }
          }
      - component.update: m5cores3_lcd
  - interval: 2s
    then:
      - lambda: |-
          if (id(is_thinking)) {
            int phase = id(eye_phase);
            int t = (phase / 2) % 4;
            float y_angles[] = {35, 25, 35, 45};
            id(servo_x_angle).publish_state(10 * ((phase % 3) - 1));
            id(servo_y_angle).publish_state(y_angles[t]);
          }

script:
  - id: set_idle
    then:
      - lambda: |-
          id(is_listening) = false;
          id(is_speaking) = false;
          id(is_thinking) = false;
          id(is_processing) = false;
      - number.set:
          id: servo_y_angle
          value: 45
      - component.update: m5cores3_lcd
  - id: set_listening
    then:
      - lambda: |-
          id(is_listening) = true;
          id(is_speaking) = false;
          id(is_thinking) = false;
          id(is_processing) = false;
          id(eye_phase) = 0;
      - component.update: m5cores3_lcd
  - id: set_speaking
    then:
      - lambda: |-
          id(is_listening) = false;
          id(is_speaking) = true;
          id(is_thinking) = false;
          id(is_processing) = false;
          id(eye_phase) = 0;
      - component.update: m5cores3_lcd
  - id: set_thinking
    then:
      - lambda: |-
          id(is_listening) = false;
          id(is_speaking) = false;
          id(is_thinking) = true;
          id(is_processing) = false;
          id(eye_phase) = 0;
      - number.set:
          id: servo_y_angle
          value: 30
      - component.update: m5cores3_lcd
  - id: set_processing
    then:
      - lambda: |-
          id(is_listening) = false;
          id(is_speaking) = false;
          id(is_thinking) = false;
          id(is_processing) = true;
          id(eye_phase) = 0;
      - number.set:
          id: servo_y_angle
          value: 45
      - component.update: m5cores3_lcd
  - id: set_display_text
    parameters:
      line1: std::string
      line2: std::string
      line3: std::string
    then:
      - lambda: |-
          id(display_line1) = line1;
          id(display_line2) = line2;
          id(display_line3) = line3;
          id(display_mode) = 9;
          id(pushed_text_timer) = 100;
      - component.update: m5cores3_lcd
  - id: nod
    then:
      - number.set:
          id: servo_y_angle
          value: 30
      - delay: 150ms
      - number.set:
          id: servo_y_angle
          value: 45
      - delay: 150ms
      - number.set:
          id: servo_y_angle
          value: 30
      - delay: 150ms
      - number.set:
          id: servo_y_angle
          value: 45
  - id: shake
    then:
      - number.set:
          id: servo_x_angle
          value: 30
      - delay: 150ms
      - number.set:
          id: servo_x_angle
          value: -30
      - delay: 150ms
      - number.set:
          id: servo_x_angle
          value: 20
      - delay: 150ms
      - number.set:
          id: servo_x_angle
          value: -20
      - delay: 100ms
      - number.set:
          id: servo_x_angle
          value: 0
  - id: point_to_tv
    then:
      - number.set:
          id: servo_x_angle
          value: 90
      - number.set:
          id: servo_y_angle
          value: 30
      - delay: 500ms
  - id: look_forward
    then:
      - number.set:
          id: servo_x_angle
          value: 0
      - number.set:
          id: servo_y_angle
          value: 45
  - id: nod
    then:
      - number.set:
          id: servo_y_angle
          value: 30
      - delay: 150ms
      - number.set:
          id: servo_y_angle
          value: 45
      - delay: 150ms
      - number.set:
          id: servo_y_angle
          value: 30
      - delay: 150ms
      - number.set:
          id: servo_y_angle
          value: 45
  - id: shake
    then:
      - number.set:
          id: servo_x_angle
          value: 30
      - delay: 150ms
      - number.set:
          id: servo_x_angle
          value: -30
      - delay: 150ms
      - number.set:
          id: servo_x_angle
          value: 20
      - delay: 150ms
      - number.set:
          id: servo_x_angle
          value: -20
      - delay: 100ms
      - number.set:
          id: servo_x_angle
          value: 0
  - id: tv_power_on
    then:
      - script.execute: point_to_tv
      - remote_transmitter.transmit_nec:
          address: 0x00FF
          command: 0xE01F
      - delay: 200ms
      - script.execute: nod
      - script.execute: look_forward
  - id: tv_switch_hdmi
    variables:
      input: int
    then:
      - script.execute: point_to_tv
      - lambda: |-
          int cmd = 0xFFA857;
          if (input == 2) cmd = 0xFF48B7;
          else if (input == 3) cmd = 0xFFC837;
          id(ir_tx).transmit_nec(0x00FF, cmd);
      - delay: 200ms
      - script.execute: nod
      - script.execute: look_forward
  - id: media_mode
    variables:
      hdmi_input: int
    then:
      - script.execute: set_processing
      - script.execute: point_to_tv
      - delay: 300ms
      - remote_transmitter.transmit_nec:
          address: 0x00FF
          command: 0xE01F
      - delay: 2s
      - lambda: |-
          int cmd = 0xFFA857;
          if (hdmi_input == 2) cmd = 0xFF48B7;
          else if (hdmi_input == 3) cmd = 0xFFC837;
          id(ir_tx).transmit_nec(0x00FF, cmd);
      - delay: 1s
      - script.execute: nod
      - script.execute: look_forward

text:
  - platform: template
    id: display_text_line1
    name: "StackChan Display Line 1"
    mode: text
    update_interval: 1s
    lambda: |-
      return id(display_line1);
    set_action:
      - lambda: |-
          id(display_line1) = x;
          id(display_mode) = 9;
          id(pushed_text_timer) = 100;
          id(m5cores3_lcd).update();
  - platform: template
    id: display_text_line2
    name: "StackChan Display Line 2"
    mode: text
    update_interval: 1s
    lambda: |-
      return id(display_line2);
    set_action:
      - lambda: |-
          id(display_line2) = x;
          id(display_mode) = 9;
          id(pushed_text_timer) = 100;
          id(m5cores3_lcd).update();
  - platform: template
    id: display_text_line3
    name: "StackChan Display Line 3"
    mode: text
    update_interval: 1s
    lambda: |-
      return id(display_line3);
    set_action:
      - lambda: |-
          id(display_line3) = x;
          id(display_mode) = 9;
          id(pushed_text_timer) = 100;
          id(m5cores3_lcd).update();

display:
  - platform: mipi_spi
    model: ILI9342
    transform:
      mirror_x: false
      mirror_y: false
      swap_xy: false
    dc_pin: GPIO35
    reset_pin:
      aw9523b_id: aw9523b_hub
      number: 9
    cs_pin:
      number: GPIO3
      ignore_strapping_warning: true
    data_rate: 40MHz
    update_interval: 1s
    invert_colors: true
    id: m5cores3_lcd
    pages:
      - id: page_main
        lambda: |-
          int phase = id(eye_phase);
          bool listening = id(is_listening);
          bool speaking = id(is_speaking);
          int dmode = id(display_mode);

          // ── Mode 9: Pushed text (HA display push) ──
          if (dmode == 9) {
            it.fill(Color(10, 10, 30));
            it.printf(10, 10, id(font_sm), Color(100, 200, 255), "%s", id(display_line1).c_str());
            it.printf(10, 40, id(font_sm), Color(200, 200, 200), "%s", id(display_line2).c_str());
            it.printf(10, 70, id(font_sm), Color(150, 150, 150), "%s", id(display_line3).c_str());
            return;
          }

          auto bg = Color(6, 6, 18);
          auto cyan = Color(40, 200, 220);
          auto cyan_dim = Color(20, 100, 120);
          auto pupil_color = Color(20, 220, 200);
          auto white = Color(220, 240, 255);
          auto accent = Color(60, 80, 180);
          auto mouth_color = Color(30, 180, 200);
          auto glow = Color(15, 50, 80);

          if (listening) {
            bg = Color(8, 10, 28);
            pupil_color = Color(50, 255, 100);
            cyan = Color(60, 255, 120);
            mouth_color = Color(50, 255, 100);
            glow = Color(20, 80, 60);
          } else if (speaking) {
            bg = Color(12, 8, 30);
            pupil_color = Color(255, 180, 50);
            cyan = Color(255, 200, 60);
            mouth_color = Color(255, 160, 40);
            glow = Color(60, 30, 15);
          } else if (id(is_thinking)) {
            bg = Color(5, 5, 30);
            pupil_color = Color(100, 150, 255);
            cyan = Color(80, 120, 255);
            mouth_color = Color(50, 80, 200);
            glow = Color(10, 20, 60);
          } else if (id(is_processing)) {
            bg = Color(20, 10, 5);
            pupil_color = Color(255, 150, 50);
            cyan = Color(255, 180, 60);
            mouth_color = Color(200, 120, 30);
            glow = Color(60, 30, 5);
          }

          it.fill(bg);

          int px = 0, py = 0;
          bool blink = false;
          int mouth_w = 50;

          if (listening || speaking) {
            px = 0; py = 2;
            mouth_w = 36;
            blink = false;
            if (speaking && (phase % 3 == 0)) mouth_w = 60;
          } else if (id(is_thinking)) {
            int slow = (phase / 2) % 8;
            px = (slow <= 1 ? 8 : slow <= 3 ? 0 : slow <= 5 ? -8 : 0);
            py = (slow <= 3 ? -5 : 3);
            blink = (phase % 8 == 0);
            mouth_w = 30;
          } else if (id(is_processing)) {
            px = 0; py = 0;
            blink = (phase % 4 == 0);
            mouth_w = 40;
          } else {
            switch (phase) {
              case 4:  px = 12; py = -3; break;
              case 14: px = -12; py = -3; break;
              case 9:  blink = true; break;
              case 15: blink = true; break;
              default: px = 0; py = 0; break;
            }
            if (phase == 2 || phase == 7) blink = true;
            mouth_w = 50;
          }

          // Left Eye
          int le_x = 55, le_y = 70, ew = 70, eh = 65;
          if (blink) {
            it.filled_rectangle(le_x, le_y + eh/2 - 3, ew, 6, cyan_dim);
            it.filled_rectangle(le_x + 4, le_y + eh/2 - 1, ew - 8, 2, cyan);
          } else {
            it.filled_rectangle(le_x, le_y, ew, eh, Color(15, 18, 40));
            it.filled_rectangle(le_x + 2, le_y, ew - 4, 4, cyan_dim);
            it.filled_rectangle(le_x + 6, le_y, ew - 12, 2, cyan);
            it.filled_rectangle(le_x + 2, le_y + eh - 4, ew - 4, 4, cyan_dim);
            it.filled_rectangle(le_x, le_y + 4, 4, eh - 8, accent);
            it.filled_rectangle(le_x + ew - 4, le_y + 4, 4, eh - 8, accent);
            it.filled_rectangle(le_x + 6, le_y + 8, ew - 12, eh - 16, Color(8, 10, 28));
            int pl_x = le_x + ew/2 - 8 + px;
            int pl_y = le_y + eh/2 - 10 + py;
            int pw = listening ? 20 : 16;
            int ph = listening ? 24 : 20;
            it.filled_rectangle(pl_x, pl_y, pw, ph, pupil_color);
            it.filled_rectangle(pl_x + 3, pl_y + 2, pw/3, ph/3, white);
          }

          // Right Eye
          int re_x = 195, re_y = 70;
          if (blink) {
            it.filled_rectangle(re_x, re_y + eh/2 - 3, ew, 6, cyan_dim);
            it.filled_rectangle(re_x + 4, re_y + eh/2 - 1, ew - 8, 2, cyan);
          } else {
            it.filled_rectangle(re_x, re_y, ew, eh, Color(15, 18, 40));
            it.filled_rectangle(re_x + 2, re_y, ew - 4, 4, cyan_dim);
            it.filled_rectangle(re_x + 6, re_y, ew - 12, 2, cyan);
            it.filled_rectangle(re_x + 2, re_y + eh - 4, ew - 4, 4, cyan_dim);
            it.filled_rectangle(re_x, re_y + 4, 4, eh - 8, accent);
            it.filled_rectangle(re_x + ew - 4, re_y + 4, 4, eh - 8, accent);
            it.filled_rectangle(re_x + 6, re_y + 8, ew - 12, eh - 16, Color(8, 10, 28));
            int pr_x = re_x + ew/2 - 8 + px;
            int pr_y = re_y + eh/2 - 10 + py;
            int pw2 = listening ? 20 : 16;
            int ph2 = listening ? 24 : 20;
            it.filled_rectangle(pr_x, pr_y, pw2, ph2, pupil_color);
            it.filled_rectangle(pr_x + 3, pr_y + 2, pw2/3, ph2/3, white);
          }

          // Mouth
          int mx = 160 - mouth_w/2, my = 175;
          int mh = speaking ? 12 : 6;
          int mh_adj = (id(is_thinking) || id(is_processing)) ? 4 : mh;
          it.filled_rectangle(mx - 4, my - 2, mouth_w + 8, mh_adj + 4, glow);
          it.filled_rectangle(mx, my, mouth_w, mh_adj, mouth_color);
          it.filled_rectangle(mx - 6, my - 2, 6, mh_adj + 4, accent);
          it.filled_rectangle(mx + mouth_w, my - 2, 6, mh_adj + 4, accent);

          // Time
          auto t = id(esptime).now();
          it.strftime(5, 218, id(font_sm), Color(50, 50, 80), "%H:%M", t);

font:
  - file: "gfonts://Figtree"
    id: font_sm
    size: 14
    glyphs: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz .:%"
