substitutions:
  name: sticks3
  friendly_name: StickS3

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    - priority: 500
      then:
        - lambda: |-
            // Debug: M5PM1 L3B init only, no display, no I2C scan
            std::array<uint8_t, 2> d1 = {0x09, 0x00};
            auto err = id(bsp_i2c).write(0x6E, d1.data(), d1.size());
            ESP_LOGI("m5pm1", "reg 0x09 write: %d", (int)err);
            delay(50);
            std::array<uint8_t, 2> d2 = {0x16, 0x00};
            err = id(bsp_i2c).write(0x6E, d2.data(), d2.size());
            ESP_LOGI("m5pm1", "reg 0x16 write: %d", (int)err);
            delay(10);
            std::array<uint8_t, 2> d3 = {0x10, 0x04};
            err = id(bsp_i2c).write(0x6E, d3.data(), d3.size());
            ESP_LOGI("m5pm1", "reg 0x10 write: %d", (int)err);
            delay(10);
            std::array<uint8_t, 2> d4 = {0x11, 0x04};
            err = id(bsp_i2c).write(0x6E, d4.data(), d4.size());
            ESP_LOGI("m5pm1", "reg 0x11 write: %d", (int)err);
            delay(100);
            ESP_LOGI("m5pm1", "L3B init done");

esp32:
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  manual_ip:
    static_ip: 192.168.1.222
    gateway: 192.168.1.1
    subnet: 255.255.255.0
  ap:

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="

ota:
  - platform: esphome

logger:
  level: INFO

i2c:
  - id: bsp_i2c
    sda: GPIO47
    scl: GPIO48
    scan: false

spi:
  clk_pin: GPIO40
  mosi_pin: GPIO39

display:
  - platform: st7789v
    model: Custom
    width: 135
    height: 240
    offset_width: 52
    offset_height: 40
    cs_pin: GPIO41
    dc_pin: GPIO45
    reset_pin: GPIO21
    backlight_pin: GPIO38
    rotation: 90°
    update_interval: 10s
    id: sticks3_display
    pages:
      - id: page_main
        lambda: |-
          it.fill(Color(5, 5, 15));
          it.printf(0, 30, id(font_sm), Color(100, 200, 255), "M5PM1 L3B ON!");
          it.printf(0, 60, id(font_sm), Color(200, 255, 100), "Display working");

font:
  - file: "gfonts://Roboto"
    id: font_sm
    size: 16
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~"

output:
  - platform: gpio
    id: led_builtin
    pin: GPIO10

light:
  - platform: binary
    id: led
    output: led_builtin
