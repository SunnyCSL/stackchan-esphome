substitutions:
  name: sticks3-diagnostic
  friendly_name: StickS3 Diagnostic

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  manual_ip:
    static_ip: 192.168.1.230
    gateway: 192.168.1.1
    subnet: 255.255.255.0

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="

ota:
  - platform: esphome

logger:
  level: VERY_VERBOSE

web_server:
  port: 80

# ── Simple button test ──
binary_sensor:
  - platform: gpio
    name: "KEY1 (GPIO11)"
    pin:
      number: GPIO11
      mode: INPUT_PULLUP
      inverted: true
    id: key1_raw
    on_press:
      then:
        - lambda: 'ESP_LOGI("test", "KEY1 PRESSED! GPIO11=LOW");'
    on_release:
      then:
        - lambda: 'ESP_LOGI("test", "KEY1 RELEASED! GPIO11=HIGH");'

  - platform: gpio
    name: "KEY2 (GPIO12)"
    pin:
      number: GPIO12
      mode: INPUT_PULLUP
      inverted: true
    id: key2_raw
    on_press:
      then:
        - lambda: 'ESP_LOGI("test", "KEY2 PRESSED! GPIO12=LOW");'
    on_release:
      then:
        - lambda: 'ESP_LOGI("test", "KEY2 RELEASED! GPIO12=HIGH");'
