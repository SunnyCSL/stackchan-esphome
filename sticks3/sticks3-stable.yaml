substitutions:
  name: sticks3
  friendly_name: StickS3

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    - priority: 500
      then:
        - lambda: |-
            // M5PM1 @ 0x6E: full init matching M5Unified Power_Class
            uint8_t cmd[2];
            uint8_t buf[2];

            // I2C wake: write reg addr then read
            cmd[0] = 0x00;
            id(bsp_i2c).write(0x6E, cmd, 1);
            delay(10);
            id(bsp_i2c).read(0x6E, buf, 1);

            // 1. Disable I2C idle sleep (reg 0x09 = 0x00)
            cmd[0] = 0x09; cmd[1] = 0x00;
            id(bsp_i2c).write(0x6E, cmd, 2);
            delay(10);

            // 2. Disable watchdog (reg 0x0A = 0x00) — CRITICAL! Prevents M5PM1 reset
            cmd[0] = 0x0A; cmd[1] = 0x00;
            id(bsp_i2c).write(0x6E, cmd, 2);
            delay(10);

            // 3. PWR_CFG: all rails on (reg 0x06 = 0x1F) — includes BOOST_EN bit3
            cmd[0] = 0x06; cmd[1] = 0x1F;
            id(bsp_i2c).write(0x6E, cmd, 2);
            delay(10);

            // 4. Read-modify-write GPIO_FUNC0: ensure PYG2 function is GPIO
            //    M5GFX: bitOff(0x16, 0x04) — clear bit 2 for PYG2 GPIO mode
            cmd[0] = 0x16;
            id(bsp_i2c).write(0x6E, cmd, 1);
            if (id(bsp_i2c).read(0x6E, buf, 1) == esphome::i2c::ErrorCode::ERROR_OK) {
              buf[0] &= ~0x04;  // clear bit 2 for PYG2 GPIO function
              cmd[0] = 0x16; cmd[1] = buf[0];
              id(bsp_i2c).write(0x6E, cmd, 2);
            }
            delay(10);

            // 5. GPIO_MODE: PYG2 output (reg 0x10 bit2 = 1)
            cmd[0] = 0x10; cmd[1] = 0x04;
            id(bsp_i2c).write(0x6E, cmd, 2);
            delay(10);

            // 6. GPIO_DRV: push-pull (reg 0x13, clear bit 2 = 0 for push-pull)
            //    CRITICAL: M5GFX uses bitOff, not bitOn! 0=push-pull, 1=open-drain
            cmd[0] = 0x13; cmd[1] = 0x00;
            id(bsp_i2c).write(0x6E, cmd, 2);
            delay(10);

            // 7. GPIO_OUT: PYG2 HIGH → L3B ON (reg 0x11 bit2 = 1)
            cmd[0] = 0x11; cmd[1] = 0x04;
            id(bsp_i2c).write(0x6E, cmd, 2);
            delay(100);
    - priority: 200
      then:
        - delay: 200ms
        - light.turn_on:
            id: sticks3_backlight
            brightness: 50%
        - delay: 100ms
        - component.update: sticks3_display

esp32:
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FLASH_SIZE: "8388608"
      CONFIG_PARTITION_TABLE_CUSTOM: "y"
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_MHZ: "240"

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  manual_ip:
    static_ip: 192.168.1.222
    gateway: 192.168.1.1
    subnet: 255.255.255.0
  ap:

web_server:
  port: 80

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="
  reboot_timeout: 30min

ota:
  - platform: esphome

logger:
  level: INFO

i2c:
  - id: bsp_i2c
    sda: GPIO47
    scl: GPIO48
    scan: false

spi:
  clk_pin: GPIO40
  mosi_pin: GPIO39

time:
  - platform: homeassistant
    id: esptime

# ── Backlight PWM (50% brightness) ──
output:
  - platform: ledc
    pin: GPIO38
    id: bl_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    name: "StickS3 Backlight"
    id: sticks3_backlight
    output: bl_pwm
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

# ── Sensors ──
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  # Battery via M5PM1 register 0x22-0x23
  - platform: template
    name: "Battery"
    id: battery
    unit_of_measurement: "V"
    accuracy_decimals: 2
    update_interval: 30s
    lambda: |-
      uint8_t reg = 0x22;
      uint8_t buf[2];
      if (id(bsp_i2c)->write(0x6E, &reg, 1) == esphome::i2c::ERROR_OK) {
        delay(1);
        if (id(bsp_i2c)->read(0x6E, buf, 2) == esphome::i2c::ERROR_OK) {
          uint16_t raw = (buf[1] << 8) | buf[0];
          return (float)raw / 1000.0;
        }
      }
      return NAN;

# ── Display (ST7789V via st7789v, 135x240) ──
display:
  - platform: st7789v
    model: TTGO TDisplay 135x240
    cs_pin: GPIO41
    dc_pin: GPIO45
    reset_pin: GPIO21
    rotation: 0°
    update_interval: 1s
    id: sticks3_display
    lambda: |-
      it.fill(Color(5, 5, 15));
      // Top line: time
      it.strftime(0, 2, id(font_lg), Color(100, 200, 255), TextAlign::TOP_LEFT, "%H:%M", id(esptime).now());
      // Battery
      float vbat = id(battery).get_state();
      if (!isnan(vbat)) {
        int pct = (int)((vbat - 3.2) / (4.2 - 3.2) * 100);
        if (pct < 0) pct = 0;
        if (pct > 100) pct = 100;
        char bat_buf[20];
        sprintf(bat_buf, "%d%%", pct);
        it.printf(90, 6, id(font_sm), Color(0, 200, 0), TextAlign::TOP_LEFT, "%s", bat_buf);
      }
      // Status line 1
      it.printf(0, 52, id(font_md), Color::WHITE, "%s", id(display_line1).c_str());
      // Status line 2
      it.printf(0, 80, id(font_md), Color(200, 200, 200), "%s", id(display_line2).c_str());
      // IP at bottom
      it.printf(0, 200, id(font_sm), Color(80, 80, 80), "%s", id(display_line3).c_str());

font:
  - file: "gfonts://Figtree"
    id: font_lg
    size: 32
    glyphs: " !\"%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_abcdefghijklmnopqrstuvwxyz"
  - file: "gfonts://Figtree"
    id: font_md
    size: 18
    glyphs: " !\"%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_abcdefghijklmnopqrstuvwxyz"
  - file: "gfonts://Figtree"
    id: font_sm
    size: 12
    glyphs: " !\"&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_abcdefghijklmnopqrstuvwxyz"
    # Include period for battery percentage

globals:
  - id: display_line1
    type: std::string
    restore_value: false
    initial_value: '"StickS3 Ready"'
  - id: display_line2
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: display_line3
    type: std::string
    restore_value: false
    initial_value: '"192.168.1.222"'

text:
  - platform: template
    name: "StickS3 Line 1"
    id: sticks3_line1
    mode: text
    update_interval: 1s
    lambda: return id(display_line1);
    set_action:
      then:
        - lambda: id(display_line1) = x;
        - component.update: sticks3_display
  - platform: template
    name: "StickS3 Line 2"
    id: sticks3_line2
    mode: text
    update_interval: 1s
    lambda: return id(display_line2);
    set_action:
      then:
        - lambda: id(display_line2) = x;
        - component.update: sticks3_display
  - platform: template
    name: "StickS3 Line 3"
    id: sticks3_line3
    mode: text
    update_interval: 1s
    lambda: return id(display_line3);
    set_action:
      then:
        - lambda: id(display_line3) = x;
        - component.update: sticks3_display

# ── Voice Pipeline (I2S Audio + Wake Word) ──
i2s_audio:
  i2s_lrclk_pin: GPIO15
  i2s_bclk_pin: GPIO17
  i2s_mclk_pin: GPIO18

microphone:
  - platform: i2s_audio
    id: sticks3_mic
    adc_type: external
    i2s_din_pin: GPIO16
    pdm: false
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: stereo

speaker:
  - platform: i2s_audio
    id: sticks3_spk
    dac_type: external
    i2s_dout_pin: GPIO14
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: mono

media_player:
  - platform: speaker
    name: "StickS3 Speaker"
    id: sticks3_speaker
    announcement_pipeline:
      speaker: sticks3_spk
      format: FLAC
      sample_rate: 16000
      num_channels: 1

micro_wake_word:
  models:
    - hey_jarvis
  on_wake_word_detected:
    - then:
        - homeassistant.event:
            event: esphome.wake_word_detected
            data:
              device: sticks3

binary_sensor:
  - platform: gpio
    name: "KEY1 Voice Trigger"
    pin:
      number: GPIO11
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - homeassistant.event:
          event: esphome.button_voice_trigger
          data:
            device: sticks3
            button: key1
  - platform: gpio
    name: "KEY2"
    pin:
      number: GPIO12
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - homeassistant.event:
          event: esphome.button_voice_trigger
          data:
            device: sticks3
            button: key2
