substitutions:
  name: sticks3
  friendly_name: StickS3

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  manual_ip:
    static_ip: 192.168.1.222
    gateway: 192.168.1.1
    subnet: 255.255.255.0
  ap:

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="

ota:
  - platform: esphome

logger:
  level: INFO

# I2C (M5PM1 + BMI270 + ES8311)
i2c:
  - id: bsp_i2c
    sda: GPIO47
    scl: GPIO48
    scan: false

# SPI (Display)
spi:
  clk_pin: GPIO40
  mosi_pin: GPIO39

# I2S Audio (ES8311) — official schematic pins, NO conflict with display CS GPIO41
i2s_audio:
  i2s_lrclk_pin: GPIO15
  i2s_bclk_pin: GPIO17
  i2s_mclk_pin: GPIO18

microphone:
  - platform: i2s_audio
    id: mic_a
    adc_type: external
    i2s_din_pin: GPIO16
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: stereo

speaker:
  - platform: i2s_audio
    id: speaker_a
    dac_type: external
    i2s_dout_pin: GPIO14
    sample_rate: 16000
    bits_per_sample: 16bit

# Display (ST7789P3)
display:
  - platform: st7789v
    model: Custom
    width: 135
    height: 240
    offset_width: 52
    offset_height: 40
    cs_pin: GPIO41
    dc_pin: GPIO45
    reset_pin: GPIO21
    backlight_pin: GPIO38
    rotation: 90°
    update_interval: never
    id: sticks3_display
    pages:
      - id: page_main
        lambda: |-
          it.fill(Color(5, 5, 15));
          it.printf(0, 30, id(font_sm), Color(100, 200, 255), "Audio test mode");

font:
  - file: "gfonts://Roboto"
    id: font_sm
    size: 16
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~"

# Buttons
binary_sensor:
  - platform: gpio
    name: "Button KEY1"
    id: btn_key1
    pin:
      number: GPIO11
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - voice_assistant.start

  - platform: gpio
    name: "Button KEY2"
    id: btn_key2
    pin:
      number: GPIO12
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - voice_assistant.stop

# Voice Assistant (button-triggered, NO wake word to save SRAM)
voice_assistant:
  microphone: mic_a
  speaker: speaker_a
  use_wake_word: false
  on_start:
    - logger.log: "Voice started via button"
  on_end:
    - logger.log: "Voice ended"
