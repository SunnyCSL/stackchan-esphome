# ============================================================
# StickS3 (Nabu) — ESP32-S3 Voice Assistant Firmware
# Role: Primary wake word device + voice assistant
# ============================================================
# Architecture:
#   micro_wake_word("okay_nabu") → on-device detection
#   voice_assistant (use_wake_word: true) → HA pipeline (Robi)
#   KEY1 (GPIO11) = push-to-talk fallback
# -----------------------------------------------------------
# Critical PMU fix:
#   M5PM1 I2C init deferred to wifi.on_connect + 3s delay
#   because I2C bus recovery only happens in main loop phase.
#   Early on_boot init always fails with "i2c bus not initialized!"
# ============================================================

substitutions:
  name: sticks3
  friendly_name: StickS3

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    - priority: 800
      then:
        # Backlight ASAP — GPIO38 directly, no PMU dependency
        - lambda: |-
            pinMode(38, OUTPUT);
            digitalWrite(38, HIGH);
            ESP_LOGI("pmu", "Backlight GPIO38 HIGH (direct GPIO)");
        - delay: 800ms
    - priority: 200
      then:
        - micro_wake_word.start
        - lambda: |-
            // Init buttons explicitly (GPIO0 needs care on ESP32-S3)
            pinMode(11, INPUT_PULLUP);
            pinMode(0, INPUT_PULLUP);
            ESP_LOGI("btn", "KEY1(GPIO11) and KEY2(GPIO0) initialized");
            // Publish initial mode so HA discovers the text_sensor
            id(current_mode).publish_state("語音");
            ESP_LOGI("mode", "Initial mode: 語音");

# ── Hardware ──────────────────────────────────────────────────

esp32:
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

captive_portal:

# ── Connectivity ──────────────────────────────────────────────

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  manual_ip:
    static_ip: 192.168.1.222
    gateway: 192.168.1.1
    subnet: 255.255.255.0
  ap:
  on_connect:
    - delay: 3s
    - lambda: |-
        static bool pmu_done = false;
        if (pmu_done) return;

        uint8_t cmd[2]; uint8_t buf[2]; bool pmu_ok = false;
        for (int retry = 0; retry < 5; retry++) {
          cmd[0] = 0x00;
          auto w = id(bsp_i2c).write(0x6E, cmd, 1); delay(5);
          auto r = id(bsp_i2c).read(0x6E, buf, 1);
          if (w == esphome::i2c::ERROR_OK && r == esphome::i2c::ERROR_OK) { pmu_ok = true; break; }
          ESP_LOGW("pmu", "PMU late retry %d/5", retry+1);
          delay(200);
        }

        if (!pmu_ok) {
          ESP_LOGW("pmu", "PMU still unreachable after wifi+3s delay");
          return;
        }

        ESP_LOGI("pmu", "M5PM1 OK (late init), configuring power rails");
        cmd[0] = 0x09; cmd[1] = 0x00; id(bsp_i2c).write(0x6E, cmd, 2); delay(10);
        cmd[0] = 0x0A; cmd[1] = 0x00; id(bsp_i2c).write(0x6E, cmd, 2); delay(10);
        cmd[0] = 0x06; cmd[1] = 0x1F; id(bsp_i2c).write(0x6E, cmd, 2); delay(10);
        cmd[0] = 0x16; id(bsp_i2c).write(0x6E, cmd, 1);
        if (id(bsp_i2c).read(0x6E, buf, 1) == esphome::i2c::ERROR_OK) {
          buf[0] &= ~0x04; cmd[0] = 0x16; cmd[1] = buf[0]; id(bsp_i2c).write(0x6E, cmd, 2);
        }
        delay(10);
        cmd[0] = 0x10; cmd[1] = 0x04; id(bsp_i2c).write(0x6E, cmd, 2); delay(10);
        cmd[0] = 0x13; cmd[1] = 0x00; id(bsp_i2c).write(0x6E, cmd, 2); delay(10);
        cmd[0] = 0x11; cmd[1] = 0x04; id(bsp_i2c).write(0x6E, cmd, 2); delay(200);
        ESP_LOGI("pmu", "M5PM1 power rails configured — screen + mic should now work");

        // Re-assert backlight through proper PMU rail
        pinMode(38, OUTPUT);
        digitalWrite(38, HIGH);

        pmu_done = true;

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="

ota:
  - platform: esphome

# ── Time ───────────────────────────────────────────────────────

time:
  - platform: homeassistant
    id: ha_time
    timezone: Asia/Hong_Kong

# ── Buses ─────────────────────────────────────────────────────

i2c:
  - id: bsp_i2c
    sda: GPIO47
    scl: GPIO48
    scan: false
    frequency: 100kHz
    setup_priority: -100

spi:
  clk_pin: GPIO40
  mosi_pin: GPIO39

# ── Display (with mode indicator) ──────────────────────────────

globals:
  - id: ui_mode
    type: int
    initial_value: '0'
    restore_value: false

display:
  - platform: st7789v
    model: TTGO TDisplay 135x240
    cs_pin: GPIO41
    dc_pin: GPIO45
    reset_pin: GPIO21
    backlight_pin: GPIO38
    rotation: 0°
    id: sticks3_display
    update_interval: 2s
    lambda: |-
      auto t = id(ha_time).now();
      float bat_v = id(battery_voltage).state;
      int bat_pct = 0;
      if (!isnan(bat_v)) {
        if (bat_v > 4.1) bat_pct = 100;
        else if (bat_v > 3.9) bat_pct = 75;
        else if (bat_v > 3.7) bat_pct = 50;
        else if (bat_v > 3.5) bat_pct = 25;
        else bat_pct = 10;
      }
      it.fill(Color(5, 5, 15));
      if (t.is_valid()) {
        char time_str[16];
        snprintf(time_str, sizeof(time_str), "%02d:%02d", t.hour, t.minute);
        it.printf(8, 8, id(font_md), Color::WHITE, "%s", time_str);
      } else {
        it.printf(8, 8, id(font_sm), Color(100,100,100), "Syncing...");
      }
      if (!isnan(bat_v)) {
        char bat_str[16];
        snprintf(bat_str, sizeof(bat_str), "BAT %d%%", bat_pct);
        it.printf(80, 10, id(font_sm), bat_v > 3.5 ? Color(100,200,100) : Color(255,100,100), "%s", bat_str);
      } else {
        it.printf(80, 10, id(font_sm), Color(100,100,100), "PWR");
      }
      // Show mode name
      int m = id(ui_mode);
      const char* mode_names[] = {"Voice", "Remote", "Chat"};
      const int mode_colors[] = {200, 150, 220};
      it.printf(8, 40, id(font_sm), Color(mode_colors[m], 200, 255 - mode_colors[m]), "%s", mode_names[m]);
      it.printf(8, 60, id(font_md), Color::WHITE, "Say:");
      it.printf(8, 82, id(font_md), Color(100, 200, 255), "\"Robi\"");

font:
  - file: "gfonts://Figtree"
    id: font_md
    size: 18
  - file: "gfonts://Figtree"
    id: font_sm
    size: 12

# ── Sensors ───────────────────────────────────────────────────

sensor:
  - platform: template
    id: battery_voltage
    name: "StickS3 Battery Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 2
    update_interval: 30s
    lambda: |-
      uint8_t reg = 0x09;
      uint8_t buf[2] = {0, 0};
      if (id(bsp_i2c).write(0x6E, &reg, 1) != esphome::i2c::ERROR_OK) return NAN;
      delay(5);
      if (id(bsp_i2c).read(0x6E, buf, 2) != esphome::i2c::ERROR_OK) return NAN;
      uint16_t raw = (buf[0] << 4) | (buf[1] & 0x0F);
      float v = raw * 0.0014f;
      if (v < 0.1) return NAN;
      return v;

text_sensor:
  - platform: template
    id: current_mode
    name: "StickS3 Current Mode"
    update_interval: never
    lambda: |-
      return "語音";

# ── Wake Word ─────────────────────────────────────────────────

micro_wake_word:
  models:
    - model: "models/robi/robi.json"
  microphone:
    microphone: sticks3_mic
    channels: 0
    gain_factor: 4
  on_wake_word_detected:
    - lambda: ESP_LOGI("ww", "Wake word detected!");
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

# ── Audio ─────────────────────────────────────────────────────

i2s_audio:
  i2s_lrclk_pin: GPIO15
  i2s_bclk_pin: GPIO17
  i2s_mclk_pin: GPIO18

microphone:
  - platform: i2s_audio
    id: sticks3_mic
    adc_type: external
    i2s_din_pin: GPIO16
    pdm: false
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: stereo
    use_apll: false

speaker:
  - platform: i2s_audio
    id: sticks3_spk
    dac_type: external
    i2s_dout_pin: GPIO14
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: mono
    use_apll: false

# ── Voice Assistant ───────────────────────────────────────────

voice_assistant:
  microphone: sticks3_mic
  speaker: sticks3_spk
  use_wake_word: true
  volume_multiplier: 2.0
  noise_suppression_level: 2
  auto_gain: 31dBFS
  on_client_connected:
    then:
      - lambda: ESP_LOGI("va", "HA voice client CONNECTED");
  on_client_disconnected:
    then:
      - lambda: ESP_LOGW("va", "HA voice client DISCONNECTED");
  on_listening:
    then:
      - lambda: ESP_LOGI("va", "=== LISTENING ===");
  on_tts_start:
    then:
      - lambda: ESP_LOGI("va", "=== SPEAKING ===");
  on_end:
    then:
      - lambda: ESP_LOGI("va", "=== VA END ===");
      - delay: 300ms
      # Re-enable wake word after voice interaction finishes
      - micro_wake_word.start

# ── Push-to-Talk ──────────────────────────────────────────────

binary_sensor:
  - platform: gpio
    name: "KEY1 Push to Talk"
    pin:
      number: GPIO11
      mode:
        input: true
        pullup: true
      inverted: true
    id: key1
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      then:
        - lambda: ESP_LOGI("key1", "KEY1 pressed!");
        - voice_assistant.start:
            wake_word: "false"

  - platform: gpio
    name: "KEY2 Mode Switch"
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
    id: key2
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      then:
        - lambda: |-
            ESP_LOGI("key2", "KEY2 pressed — mode switch");
            id(ui_mode) = (id(ui_mode) + 1) % 3;
            id(sticks3_display).update();
            // Publish to HA so bridge knows current mode
            if (id(ui_mode) == 0) id(current_mode).publish_state("語音");
            else if (id(ui_mode) == 1) id(current_mode).publish_state("遙控");
            else id(current_mode).publish_state("傾偈");
