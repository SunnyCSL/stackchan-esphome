substitutions:
  name: sticks3
  friendly_name: StickS3

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    - priority: 700
      then:
        - delay: 800ms
    - priority: 600
      then:
        - lambda: |-
            uint8_t cmd[2]; uint8_t buf[2]; bool pmu_ok = false;
            for (int retry = 0; retry < 5; retry++) {
              cmd[0] = 0x00;
              auto w = id(bsp_i2c).write(0x6E, cmd, 1); delay(5);
              auto r = id(bsp_i2c).read(0x6E, buf, 1);
              if (w == esphome::i2c::ERROR_OK && r == esphome::i2c::ERROR_OK) { pmu_ok = true; break; }
              ESP_LOGW("pmu", "M5PM1 I2C retry %d", retry+1); delay(50);
            }
            if (!pmu_ok) { ESP_LOGE("pmu", "M5PM1 I2C FAILED"); }
            else {
              ESP_LOGI("pmu", "M5PM1 OK, configuring power rails");
              cmd[0] = 0x09; cmd[1] = 0x00; id(bsp_i2c).write(0x6E, cmd, 2); delay(10);
              cmd[0] = 0x0A; cmd[1] = 0x00; id(bsp_i2c).write(0x6E, cmd, 2); delay(10);
              cmd[0] = 0x06; cmd[1] = 0x1F; id(bsp_i2c).write(0x6E, cmd, 2); delay(10);
              cmd[0] = 0x16; id(bsp_i2c).write(0x6E, cmd, 1);
              if (id(bsp_i2c).read(0x6E, buf, 1) == esphome::i2c::ERROR_OK) {
                buf[0] &= ~0x04; cmd[0] = 0x16; cmd[1] = buf[0]; id(bsp_i2c).write(0x6E, cmd, 2);
              }
              delay(10);
              cmd[0] = 0x10; cmd[1] = 0x04; id(bsp_i2c).write(0x6E, cmd, 2); delay(10);
              cmd[0] = 0x13; cmd[1] = 0x00; id(bsp_i2c).write(0x6E, cmd, 2); delay(10);
              cmd[0] = 0x11; cmd[1] = 0x04; id(bsp_i2c).write(0x6E, cmd, 2); delay(100);
            }
            pinMode(38, OUTPUT); digitalWrite(38, HIGH);
            ESP_LOGI("pmu", "Backlight GPIO38 HIGH");

esp32:
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  manual_ip:
    static_ip: 192.168.1.222
    gateway: 192.168.1.1
    subnet: 255.255.255.0
  ap:

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="

ota:
  - platform: esphome

i2c:
  - id: bsp_i2c
    sda: GPIO47
    scl: GPIO48
    scan: false

spi:
  clk_pin: GPIO40
  mosi_pin: GPIO39

display:
  - platform: st7789v
    model: TTGO TDisplay 135x240
    cs_pin: GPIO41
    dc_pin: GPIO45
    reset_pin: GPIO21
    backlight_pin: GPIO38
    rotation: 0°
    id: sticks3_display
    lambda: |-
      it.fill(Color(5, 5, 15));
      it.printf(8, 60, id(font_md), Color::WHITE, "StickS3 Ready");
      it.printf(8, 90, id(font_sm), Color(100, 200, 100), "KEY1=Talk");

font:
  - file: "gfonts://Figtree"
    id: font_md
    size: 18
  - file: "gfonts://Figtree"
    id: font_sm
    size: 12

i2s_audio:
  i2s_lrclk_pin: GPIO15
  i2s_bclk_pin: GPIO17
  i2s_mclk_pin: GPIO18

microphone:
  - platform: i2s_audio
    id: sticks3_mic
    adc_type: external
    i2s_din_pin: GPIO16
    pdm: false
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: stereo
    use_apll: false

speaker:
  - platform: i2s_audio
    id: sticks3_spk
    dac_type: external
    i2s_dout_pin: GPIO14
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: mono
    use_apll: false

voice_assistant:
  microphone: sticks3_mic
  speaker: sticks3_spk
  volume_multiplier: 2.0
  on_client_connected:
    then:
      - lambda: ESP_LOGI("va", "HA voice client CONNECTED");
  on_client_disconnected:
    then:
      - lambda: ESP_LOGW("va", "HA voice client DISCONNECTED");
  on_listening:
    then:
      - lambda: ESP_LOGI("va", "=== LISTENING ===");
  on_tts_start:
    then:
      - lambda: ESP_LOGI("va", "=== SPEAKING ===");
  on_end:
    then:
      - lambda: ESP_LOGI("va", "=== VA END ===");

binary_sensor:
  - platform: gpio
    name: "KEY1 Voice Trigger"
    pin:
      number: GPIO11
      mode:
        input: true
        pullup: true
      inverted: true
    id: key1
    on_press:
      - voice_assistant.start:
          wake_word: "false"
