substitutions:
  name: sticks3
  friendly_name: StickS3

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

logger:
  level: VERBOSE
  hardware_uart: USB_SERIAL_JTAG

wifi:
  ssid: "SC"
  password: "8447Ce8086"

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="

ota:
  - platform: esphome

i2c:
  - id: bsp_i2c
    sda: GPIO4
    scl: GPIO5
    scan: true
    frequency: 100kHz

i2s_audio:
  i2s_lrclk_pin: GPIO15
  i2s_bclk_pin: GPIO17
  i2s_mclk_pin: GPIO18

microphone:
  - platform: i2s_audio
    id: sticks3_mic
    adc_type: external
    i2s_din_pin: GPIO16
    pdm: false
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: stereo
    use_apll: false

speaker:
  - platform: i2s_audio
    id: sticks3_spk
    dac_type: external
    i2s_dout_pin: GPIO14
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: mono
    use_apll: false

voice_assistant:
  microphone: sticks3_mic
  volume_multiplier: 2.0
  on_client_connected:
    then:
      - lambda: |-
          ESP_LOGI("va", "HA voice client CONNECTED");
  on_client_disconnected:
    then:
      - lambda: |-
          ESP_LOGW("va", "HA voice client DISCONNECTED");
  on_error:
    then:
      - lambda: |-
          ESP_LOGE("va", "Voice error: code=%d msg=%s", code, message.c_str());
  on_listening:
    then:
      - lambda: |-
          ESP_LOGI("va", "=== LISTENING ===");
  on_tts_start:
    then:
      - lambda: |-
          ESP_LOGI("va", "=== SPEAKING ===");
  on_stt_end:
    then:
      - lambda: |-
          ESP_LOGI("va", "=== STT DONE ===");
  on_end:
    then:
      - lambda: |-
          ESP_LOGI("va", "=== VA END ===");

binary_sensor:
  - platform: gpio
    name: "KEY1 Voice Trigger"
    pin:
      number: GPIO11
      mode:
        input: true
        pullup: true
      inverted: true
    id: key1
    on_press:
      - voice_assistant.start:
          wake_word: "false"
    on_release:
      - voice_assistant.stop:
