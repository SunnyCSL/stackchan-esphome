substitutions:
  name: sticks3
  friendly_name: StickS3

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    - priority: 500
      then:
        - lambda: |-
            // M5PM1 L3B power rail enable (required for display)
            uint8_t cmd[2];
            cmd[0] = 0x09; cmd[1] = 0x00;
            id(bsp_i2c).write(0x6E, cmd, 2);
            delay(50);
            uint8_t reg = 0x16;
            id(bsp_i2c).write(0x6E, &reg, 1);
            uint8_t func0;
            if (id(bsp_i2c).read(0x6E, &func0, 1) == esphome::i2c::ErrorCode::ERROR_OK) {
              func0 &= ~0x30;
              cmd[0] = 0x16; cmd[1] = func0;
              id(bsp_i2c).write(0x6E, cmd, 2);
            }
            delay(10);
            cmd[0] = 0x10; cmd[1] = 0x04;
            id(bsp_i2c).write(0x6E, cmd, 2);
            delay(10);
            cmd[0] = 0x11; cmd[1] = 0x04;
            id(bsp_i2c).write(0x6E, cmd, 2);
            delay(100);
    - priority: 200
      then:
        - delay: 200ms

esp32:
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
  # psram block removed for 8MB batch stability

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  manual_ip:
    static_ip: 192.168.1.222
    gateway: 192.168.1.1
    subnet: 255.255.255.0
  ap:

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="

ota:
  - platform: esphome

logger:
  level: INFO

i2c:
  - id: bsp_i2c
    sda: GPIO47
    scl: GPIO48

spi:
  clk_pin: GPIO40
  mosi_pin: GPIO39

time:
  - platform: homeassistant
    id: esptime

display:
  - platform: st7789v
    model: Custom
    width: 135
    height: 240
    offset_width: 52
    offset_height: 40
    cs_pin: GPIO41
    dc_pin: GPIO45
    reset_pin: GPIO21
    backlight_pin: GPIO38
    rotation: 90°
    update_interval: 10s
    id: sticks3_display
    pages:
      - id: page_main
        lambda: |-
          it.fill(Color(5, 5, 15));
          it.strftime(0, 0, id(font_md), Color(255, 255, 255), TextAlign::TOP_LEFT, "%H:%M", id(esptime).now());
          it.printf(0, 30, id(font_sm), Color(100, 200, 255), "StickS3 minimal");
          it.printf(0, 50, id(font_sm), Color(80, 255, 80), "Display OK");

font:
  - file: "gfonts://Figtree"
    id: font_md
    size: 20
    glyphs: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz .:%->'
  - file: "gfonts://Figtree"
    id: font_sm
    size: 12
    glyphs: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz .:%->'

binary_sensor:
  - platform: gpio
    name: "Button KEY1"
    id: btn_key1
    pin:
      number: GPIO11
      mode: INPUT_PULLUP
      inverted: true
  - platform: gpio
    name: "Button KEY2"
    id: btn_key2
    pin:
      number: GPIO12
      mode: INPUT_PULLUP
      inverted: true
