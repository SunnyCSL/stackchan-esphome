substitutions:
  name: sticks3
  friendly_name: StickS3

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    - priority: 500
      then:
        - lambda: |-
            // Enable M5PM1 L3B power rail (0x6E)
            std::array<uint8_t, 2> d1 = {0x09, 0x00};
            auto err = id(bsp_i2c).write(0x6E, d1.data(), d1.size());
            if (err != i2c::ERROR_OK) ESP_LOGW("m5pm1", "L3B init reg 0x09 failed: %d", (int)err);
            delay(50);
            std::array<uint8_t, 2> d2 = {0x16, 0x00};
            err = id(bsp_i2c).write(0x6E, d2.data(), d2.size());
            if (err != i2c::ERROR_OK) ESP_LOGW("m5pm1", "L3B init reg 0x16 failed: %d", (int)err);
            delay(10);
            std::array<uint8_t, 2> d3 = {0x10, 0x04};
            err = id(bsp_i2c).write(0x6E, d3.data(), d3.size());
            if (err != i2c::ERROR_OK) ESP_LOGW("m5pm1", "L3B init reg 0x10 failed: %d", (int)err);
            delay(10);
            std::array<uint8_t, 2> d4 = {0x11, 0x04};
            err = id(bsp_i2c).write(0x6E, d4.data(), d4.size());
            if (err != i2c::ERROR_OK) ESP_LOGW("m5pm1", "L3B init reg 0x11 failed: %d", (int)err);
            delay(100);

esp32:
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  manual_ip:
    static_ip: 192.168.1.222
    gateway: 192.168.1.1
    subnet: 255.255.255.0
  ap:

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="

ota:
  - platform: esphome

logger:
  level: INFO

i2c:
  - id: bsp_i2c
    sda: GPIO47
    scl: GPIO48
    scan: true

spi:
  clk_pin: GPIO40
  mosi_pin: GPIO39

display:
  - platform: st7789v
    model: Custom
    width: 135
    height: 240
    offset_width: 52
    offset_height: 40
    cs_pin: GPIO41
    dc_pin: GPIO45
    reset_pin: GPIO21
    backlight_pin: GPIO38
    rotation: 90°
    update_interval: 10s
    id: sticks3_display
    pages:
      - id: page_main
        lambda: |-
          it.fill(Color(5, 5, 15));
          it.printf(0, 30, id(font_sm), Color(100, 200, 255), "StickS3 M5PM1 I2C");

font:
  - file: "gfonts://Figtree"
    id: font_sm
    size: 16
    glyphs: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz .:%"

binary_sensor:
  - platform: gpio
    name: "Button KEY1"
    id: btn_key1
    pin:
      number: GPIO11
      mode: INPUT_PULLUP
      inverted: true
  - platform: gpio
    name: "Button KEY2"
    id: btn_key2
    pin:
      number: GPIO12
      mode: INPUT_PULLUP
      inverted: true
