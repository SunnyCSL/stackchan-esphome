substitutions:
  name: sticks3
  friendly_name: StickS3

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    - priority: -100
      then:
        - lambda: |-
            // Probe M5PM1
            uint8_t buf[1];
            auto err = id(bsp_i2c)->read(0x6E, buf, 1);
            if (err == esphome::i2c::ERROR_OK) {
              ESP_LOGI("m5pm1", "M5PM1 ID=0x%02X at 0x6E", buf[0]);
            } else {
              ESP_LOGE("m5pm1", "M5PM1 NOT FOUND at 0x6E");
            }
    - priority: 200
      then:
        - delay: 200ms
        - lambda: |-
            // M5PM1: all rails ON + PYG2(L3B backlight) + PYG3(AW8737 amp)
            uint8_t cmd[2];
            // Sleep timeout = 0
            cmd[0] = 0x09; cmd[1] = 0x00;
            id(bsp_i2c)->write(0x6E, cmd, 2);
            // All power rails on
            cmd[0] = 0x06; cmd[1] = 0x1F;
            id(bsp_i2c)->write(0x6E, cmd, 2);
            // GPIO_FUNC0: all GPIO
            cmd[0] = 0x16; cmd[1] = 0x00;
            id(bsp_i2c)->write(0x6E, cmd, 2);
            // GPIO_MODE: PYG2 + PYG3 output
            cmd[0] = 0x10; cmd[1] = 0x0C;
            id(bsp_i2c)->write(0x6E, cmd, 2);
            // GPIO_DRV: PYG2 + PYG3 push-pull
            cmd[0] = 0x13; cmd[1] = 0x0C;
            id(bsp_i2c)->write(0x6E, cmd, 2);
            // GPIO_OUT: PYG2 HIGH (backlight) + PYG3 HIGH (amp enable)
            cmd[0] = 0x11; cmd[1] = 0x0C;
            id(bsp_i2c)->write(0x6E, cmd, 2);
            ESP_LOGI("m5pm1", "M5PM1: PYG2(L3B) ON, PYG3(AW8737) ON");
        - delay: 50ms
        - lambda: |-
            // AW8737 pulse: register 0x53 = gain step count
            // Send pulse by toggling PYG3 low then high
            uint8_t cmd[2];
            // Set AW8737 gain (0x53 = 0xE3 for max)
            cmd[0] = 0x53; cmd[1] = 0xE3;
            id(bsp_i2c)->write(0x6E, cmd, 2);
            // Pulse PYG3: low then high
            cmd[0] = 0x11; cmd[1] = 0x04;  // PYG3 LOW
            id(bsp_i2c)->write(0x6E, cmd, 2);
            delay(1);
            cmd[0] = 0x11; cmd[1] = 0x0C;  // PYG3 HIGH
            id(bsp_i2c)->write(0x6E, cmd, 2);
            ESP_LOGI("aw8737", "AW8737 pulsed for max gain");
        - delay: 100ms
        - light.turn_on: sticks3_backlight
        - delay: 200ms
        - component.update: sticks3_display

esp32:
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FLASH_SIZE: "8388608"
      CONFIG_PARTITION_TABLE_CUSTOM: "y"
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_MHZ: "240"

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: "SC"
  password: "8447Ce8086"
  manual_ip:
    static_ip: 192.168.1.222
    gateway: 192.168.1.1
    subnet: 255.255.255.0
  ap:

web_server:
  port: 80

api:
  encryption:
    key: "4yIspKQlOBu34SLnIQOFeNAQpk3Ke6kX18FTekvpaQk="
  reboot_timeout: 30min

ota:
  - platform: esphome

logger:
  level: INFO

i2c:
  - id: bsp_i2c
    sda: GPIO47
    scl: GPIO48
    scan: true

spi:
  clk_pin: GPIO40
  mosi_pin: GPIO39

time:
  - platform: homeassistant
    id: esptime

# ── Audio DAC: ES8311 codec (I2C at 0x18) ──
audio_dac:
  - platform: es8311
    id: es8311_dac
    bits_per_sample: 16bit
    sample_rate: 16000
    use_microphone: true
    mic_gain: 42DB

# ── I2S Audio bus ──
i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO15
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO18

microphone:
  - platform: i2s_audio
    id: mic_a
    i2s_audio_id: i2s_bus
    adc_type: external
    i2s_din_pin: GPIO16
    pdm: false
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: stereo

speaker:
  - platform: i2s_audio
    id: speaker_a
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO14
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: left
    audio_dac: es8311_dac

media_player:
  - platform: speaker
    name: "StickS3 Speaker"
    id: sticks3_speaker
    announcement_pipeline:
      speaker: speaker_a
      format: WAV
      sample_rate: 16000
      num_channels: 1

# ── Voice Assistant (button-triggered, no wake word) ──
voice_assistant:
  microphone: mic_a
  speaker: speaker_a
  use_wake_word: false
  noise_suppression_level: 2
  volume_multiplier: 2.0
  on_start:
    - lambda: |-
        id(display_mode) = 1;
        id(sticks3_display).update();
    - logger.log: "Voice started"
  on_end:
    - lambda: |-
        id(display_mode) = 0;
        id(sticks3_display).update();
    - logger.log: "Voice ended"
  on_error:
    - lambda: |-
        id(display_mode) = 0;
        id(sticks3_display).update();
    - logger.log: "Voice error"
  on_listening:
    - lambda: |-
        id(display_mode) = 1;
    - component.update: sticks3_display

# ── Outputs ──
output:
  - platform: gpio
    pin: GPIO38
    id: backlight_gpio

light:
  - platform: binary
    name: "StickS3 Backlight"
    id: sticks3_backlight
    output: backlight_gpio
    restore_mode: ALWAYS_ON

# ── Display (ST7789P3, 135x240) ──
display:
  - platform: st7789v
    model: TTGO TDisplay 135x240
    cs_pin: GPIO41
    dc_pin: GPIO45
    reset_pin: GPIO21
    rotation: 0°
    update_interval: 1s
    id: sticks3_display
    pages:
      - id: page_main
        lambda: |-
          it.fill(Color(5, 5, 15));
          int mode = id(display_mode);
          if (mode == 0) {
            // Idle — show time + battery
            it.strftime(0, 0, id(font_lg), Color(100, 200, 255), TextAlign::TOP_LEFT, "%H:%M", id(esptime).now());
            it.printf(0, 60, id(font_md), Color::WHITE, "Idle");
            // Battery voltage from M5PM1
            uint8_t reg = 0x22;
            uint8_t buf[2];
            if (id(bsp_i2c)->write(0x6E, &reg, 1) == esphome::i2c::ERROR_OK) {
              delay(1);
              if (id(bsp_i2c)->read(0x6E, buf, 2) == esphome::i2c::ERROR_OK) {
                uint16_t raw = (buf[1] << 8) | buf[0];
                float vbat = (float)raw / 1000.0;
                int pct = (int)((vbat - 3.2) / (4.2 - 3.2) * 100);
                if (pct < 0) pct = 0;
                if (pct > 100) pct = 100;
                char b[24];
                sprintf(b, "BAT %.2fV %d%%", vbat, pct);
                it.printf(0, 200, id(font_sm), Color(150, 200, 100), "%s", b);
              }
            }
          } else if (mode == 1) {
            // Listening
            it.printf(0, 0, id(font_lg), Color(0, 255, 100), TextAlign::TOP_LEFT, "Listening...");
            it.printf(4, 95, id(font_sm), Color(0, 180, 80), "o o o");
          } else if (mode == 2) {
            // Speaking / Processing
            it.printf(0, 0, id(font_lg), Color(255, 180, 0), TextAlign::TOP_LEFT, "Speaking");
          } else if (mode == 9) {
            // Custom text from HA
            it.printf(0, 0, id(font_lg), Color(100, 200, 255), TextAlign::TOP_LEFT, "%s", id(display_line1).c_str());
            if (id(display_line2).length() > 0) {
              it.printf(0, 42, id(font_md), Color::WHITE, "%s", id(display_line2).c_str());
            }
            if (id(display_line3).length() > 0) {
              it.printf(0, 70, id(font_sm), Color(200, 200, 200), "%s", id(display_line3).c_str());
            }
          }

font:
  - file: "gfonts://Figtree"
    id: font_lg
    size: 32
    glyphs: " !\"%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_abcdefghijklmnopqrstuvwxyz"
  - file: "gfonts://Figtree"
    id: font_md
    size: 20
    glyphs: " !\"%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_abcdefghijklmnopqrstuvwxyz"
  - file: "gfonts://Figtree"
    id: font_sm
    size: 14
    glyphs: " !\"%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_abcdefghijklmnopqrstuvwxyz"

globals:
  - id: display_mode
    type: int
    restore_value: false
    initial_value: '0'
  - id: display_line1
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: display_line2
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: display_line3
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: pushed_text_timer
    type: int
    restore_value: false
    initial_value: '0'
  - id: idle_counter
    type: int
    restore_value: false
    initial_value: '0'
  - id: accel_x_prev
    type: int
    restore_value: false
    initial_value: '0'
  - id: accel_y_prev
    type: int
    restore_value: false
    initial_value: '0'
  - id: accel_z_prev
    type: int
    restore_value: false
    initial_value: '0'

script:
  - id: sticks3_set_display_text
    parameters:
      line1: std::string
      line2: std::string
      line3: std::string
    then:
      - lambda: |-
          id(display_line1) = line1;
          id(display_line2) = line2;
          id(display_line3) = line3;
          id(display_mode) = 9;
          id(pushed_text_timer) = 100;
          id(sticks3_display).update();

text:
  - platform: template
    id: display_text_line1
    name: "StickS3 Display Line 1"
    mode: text
    update_interval: 1s
    lambda: |-
      return id(display_line1);
    set_action:
      - lambda: |-
          id(display_line1) = x;
          id(display_mode) = 9;
          id(pushed_text_timer) = 100;
          id(sticks3_display).update();
  - platform: template
    id: display_text_line2
    name: "StickS3 Display Line 2"
    mode: text
    update_interval: 1s
    lambda: |-
      return id(display_line2);
    set_action:
      - lambda: |-
          id(display_line2) = x;
          id(display_mode) = 9;
          id(pushed_text_timer) = 100;
          id(sticks3_display).update();
  - platform: template
    id: display_text_line3
    name: "StickS3 Display Line 3"
    mode: text
    update_interval: 1s
    lambda: |-
      return id(display_line3);
    set_action:
      - lambda: |-
          id(display_line3) = x;
          id(display_mode) = 9;
          id(pushed_text_timer) = 100;
          id(sticks3_display).update();

interval:
  - id: update_interval_display
    interval: 1s
    then:
      - lambda: |-
          if (id(pushed_text_timer) > 0) {
            id(pushed_text_timer)--;
            if (id(pushed_text_timer) == 0 && id(display_mode) == 9) {
              id(display_mode) = 0;
            }
          }

  - id: motion_interval_1s
    interval: 1s
    then:
      - lambda: |-
          if (!id(accel_x).has_state() || !id(accel_y).has_state() || !id(accel_z).has_state()) {
            return;
          }
          float ax = id(accel_x).state;
          float ay = id(accel_y).state;
          float az = id(accel_z).state;
          int iax = int(ax * 100);
          int iay = int(ay * 100);
          int iaz = int(az * 100);
          int dx = abs(iax - id(accel_x_prev));
          int dy = abs(iay - id(accel_y_prev));
          int dz = abs(iaz - id(accel_z_prev));
          id(accel_x_prev) = iax;
          id(accel_y_prev) = iay;
          id(accel_z_prev) = iaz;
          bool motion = (dx > 8 || dy > 8 || dz > 8);

          if (motion || id(display_mode) == 1 || id(display_mode) == 2) {
            id(idle_counter) = 0;
            return;
          }

          if (id(idle_counter) < 30) {
            id(idle_counter)++;
          }

binary_sensor:
  - platform: gpio
    name: "Button KEY1"
    pin:
      number: GPIO11
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - lambda: |-
          id(idle_counter) = 0;
      - voice_assistant.start

  - platform: gpio
    name: "Button KEY2"
    pin:
      number: GPIO12
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - lambda: |-
          id(idle_counter) = 0;
      - voice_assistant.start

# MPU6886 Accelerometer
sensor:
  - platform: mpu6886
    id: imu
    i2c_id: bsp_i2c
    address: 0x68
    accel_x:
      name: "StickS3 Accel X"
      id: accel_x
      internal: true
    accel_y:
      name: "StickS3 Accel Y"
      id: accel_y
      internal: true
    accel_z:
      name: "StickS3 Accel Z"
      id: accel_z
      internal: true
    update_interval: 1s
